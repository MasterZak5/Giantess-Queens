 macrophilitism:0 "Macrophilitism"
 macrophilitism_adj:0 "Macrophilitist"
 macrophilitism_adherent:0 "Macrophilitist"
 macrophilitism_adherent_plural:0 "Macrophilitists"
 macrophilitism_desc:0 "The dominant faith of giantess worship. Macrophilitists believe that giantesses and tinies are made equal, and need to respect each other's rights. Giantesses and tinies have a responsibility to pleasure each other. Tinies are obliged to provide giantesses with food."
 macrocentrism:0 "Macrocentrism"
 macrocentrism_adj:0 "Macrocentrist"
 macrocentrism_adherent:0 "Macrocentrist"
 macrocentrism_adherent_plural:0 "Macrocentrists"
 macrocentrism_desc:0 "Macrocentrists recognize that the giantesses are made in Allmother's image, and are thus superior to tinies. The purpose of tinies' existence is serving their giantesses, but excess cruely towards tinies is prohibitied. Giantesses have reduced tyranny gains from unlawful actions and lose less piety."
 macrosuprematism:0 "Macrosuprematism"
 macrosuprematism_adj:0 "Macrosuprematist"
 macrosuprematism_adherent:0 "Macrosuprematist"
 macrosuprematism_adherent_plural:0 "Macrosuprematists"
 macrosuprematism_desc:0 "Macrosuprematists are giantesses who believe that the tinies were created as a punishment for giantesses' indolence. To get back their immortaliy, giantesses need to enslave and eventually eradicate the tinies. Who knows, maybe they are right? Giantesses don't get tyranny from unlawful actions and gain piety from torturing tinies."
 greek_titans: "Greek Titans"
 greek_titans_adj: "Greek Titans"
 greek_titans_adherent: "Titanist"
 greek_titans_adherent_plural: "Titanists"
 greek_titans_desc: "Titanists believe that the titanesses from ancient Greek mythology are the ancestors of modern giantesses. Giantesses are obligated to rule over the lower realm like the old gods once did and keep mortals in check."
 jotunism: "Jotunism"
 jotunism_adj: "Jotunist"
 jotunism_adherent: "Jotunist"
 jotunism_adherent_plural: "Jotunists"
 jotunism_desc: "Jotunists linked giantesses to the frost giants of Norse myth. Just as Jotuns were forces of nature that struck fear into the hearts of mortals, so do giantesses. They may not be benevolent gods, but they are gods nonetheless and must be worshipped."
 
 doctrine_giantess_acceptance_name: "Giantess Acceptance"
 doctrine_giantess_acceptance_demonized_name: "Demonized"
 doctrine_giantess_acceptance_demonized_desc: "Giantesses are a blight on the world that threatens our very existence. They need to be wiped out before they destroy the world."
 doctrine_parameter_giantess_demonized: "Characters with the [GetTrait('giantess').GetName( GetPlayer )] [trait|E] are [criminals|E]"
 doctrine_giantess_acceptance_shunned_name: "Shunned"
 doctrine_giantess_acceptance_shunned_desc: "Giantesses can't be trusted. They are as powerful as an army and yet they are subject to the whims of the heart. There is no knowing what they will do."
 doctrine_parameter_giantess_shunned: "Characters with the [GetTrait('giantess').GetName( GetPlayer )] [trait|E] are [shunned|E]"
 doctrine_giantess_acceptance_accepted_name: "Accepted"
 doctrine_giantess_acceptance_accepted_desc: "While they are vastly different from tinies in physique, they are people all the same. If they can be reasoned with, then they should be accepted into the community."
 doctrine_parameter_giantess_accepted: "Characters with the [GetTrait('giantess').GetName( GetPlayer )] [trait|E] are fully accepted"
 doctrine_giantess_acceptance_worshipped_name: "Worshipped"
 doctrine_giantess_acceptance_worshipped_desc: "Giantesses are gods made flesh. They should be worshipped and obeyed by all tinyfolk without question or reward. They are the rightful rulers of this world."
 doctrine_parameter_giantess_worshipped: "Characters with the [GetTrait('giantess').GetName( GetPlayer )] [trait|E] are fully accepted"

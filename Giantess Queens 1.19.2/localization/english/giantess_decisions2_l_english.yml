l_english:

 # Form the Titanes
 form_titanes_decision: "The Titanesses of Greece"
 form_titanes_decision_desc: "The ancient Greeks worshipped titans in their pantheons, some of which were female. We can make use of this to boost our legitimacy in Greece."
 form_titanes_decision_tooltip: "The Titanes will be restored"
 form_titanes_decision_confirm: "Consider our options"
 form_titanes_decision_effect_tooltip: "Form [GetTitleByKey('k_titanes').GetNameNoTier] and gain Legitimacy and Prestige"
 # Form Jötunheimr
 form_jotunheim_decision: "The Jotuns of Jötunheimr"
 form_jotunheim_decision_desc: "The Jotuns are the dreadful enemy of Asgard, and giants who thrive in the frozen hellscape of The Jotuns of Jötunheimr. Using their infamy, we can keep a tighter reign on the tinies."
 form_jotunheim_decision_tooltip: "Jötunheimr will be created"
 form_jotunheim_decision_confirm: "Consider our options"
 form_jotunheim_decision_effect_tooltip: "Form [GetTitleByKey('k_jotunheim').GetNameNoTier] and gain Legitimacy and Prestige"
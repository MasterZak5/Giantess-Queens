 giantess_execution.0001.desc_ass:0 "I watch my door violently shove open as [actor.GetShortUINamePossessive] guard's move in and proceed to pin me to the floor. The [actor.GetTitleAsNameNoTooltip] herself follows in after them, sporting a deeply unsettling and toothy smile. She truly is like a goddess beside me, big enough to pick me up like a doll and o as she pleases. \n\nCaring not for my struggles and pleas, she crouches above me and lowers her great ass towards my body. It descends slowly, casting a dark shadow over my body and giving me just enough time to consider how things could have gotten so dire before her flesh collides with mine and my bones are crushed beneath her great weight. My last breath is squeezed out beneath her plump backside, and I soon lay lifeless beneath her."
 giantess_execution.0001.desc_swallow:0 "I watch my door violently shoved open as [actor.GetTitleAsNameNoTooltip] entered. Our eyes lock as she stares me down, dawning a malicious smirk that deeply worries me. Does she have foul intentions? \n\nHer arm shoots out towards me, fingers reaching to grasp tightly around my torso. She crouches down in front of me, wearing a hungry and impatient look as I try to resist her strength. She carelessly shoves my body in against her lips, her mouth opening wide, letting me stare in terror down her throat and see those strings of spit spread between her jaws as they part. She only hesitates for a single moment before dropping me into her gaping maw and sending her fingers violently thrusting against my back. Her lips close behind me as I descend into her mouth. Her tongue easily dominates me and forces my body down her throat. It only takes a few loud, sloppy swallows before even the smallest hope of resisting her I had before was vanquished. She leaves me to waste away in her stomach, verbalizing soft, satisfied moans as she rubs her stomach. The giantess is left licking her lips and smiling, quite pleased with herself. I feel my body burn for hours before her gut's churning finally ends my life and I am fully digested as nothing more than a simple meal to become a part of [actor.GetShortUINamePossessiveNoTooltip] body like any other piece of meat."
 giantess_execution.0001.desc_shoecrush:0 "*Thud* *Thud*? The earth is shaking, that only means one thing. The door opens, I see [actor.GetTitleAsNameNoTooltip] staring right at me. Then with a loud and booming voice she says 'Your time is up, BUG!'. She started to walk towards me, I instinctively ran away from those building sized feet. I can't get away from her, and in my blind dash I slammed into the wall. I'm cornered, nowhere else to go. I now turn around to see the truly massive being stare down at me. She raises her foot above my body covering my entire field of view, all I can see are the other 'bugs' crushed and squashed to the bottom of her shoe. She slowly lowers her shoe on top of me pressing me against the floor. As I feel my life leaving me I can only stare at the faces of those who had come to the same fate."
 giantess_execution.0001.a:0 "Nobody can save me..."

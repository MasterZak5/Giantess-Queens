 giantess_execution.0002.desc_shoecrush:0 "I stride towards [recipient.GetName] with a devious expression, [recipient.GetSheHe] looks uneasy. Each step I take loudly announces itself and shakes the ground. [recipient.GetFirstName] is already beginning to back away from me as I come close towards [recipient.GetHerHim]. "That's not going to help you, BUG!" I say, making my ill intentions clear before I start to put harsh power into each step and send what might as well be an earthquake down to [recipient.GetHerHis] world. I lift my foot above [recipient.GetHerHim], showing off the mangled corpses of previous victims, who I had, knowingly or unknowingly, ended and made a red stain beneath my shoe. [recipient.GetShortUINamePossessiveNoTooltip] expression descends into despair as I slowly lower my foot towards [recipient.GetHerHim]. [recipient.GetName] tries to run and scream but it's no use and I soon pin [recipient.GetHerHis] body. I start to apply pressure and in only seconds, *POP*. I giggle. [recipient.GetName] didn't stand a chance."
 giantess_execution.0001.desc_unbirth:1 "My doors open, and guards stream in my chamber. They tie me up, and bring me in a massive bedchamber, where they leave me on the massive bed. After a while [actor.GetShortUINamePossessive] enter the room, naked, and sit on the bed. Her long legs distended to either my sides, i have an unobstructed view of her loins. Without a word she gently picks me up, bringing me to the damp slit. After rubbing me up and down for a few minutes[actor.GetShortUINamePossessive] shove me inside, letting my body slip un deeper and deeper inside her."

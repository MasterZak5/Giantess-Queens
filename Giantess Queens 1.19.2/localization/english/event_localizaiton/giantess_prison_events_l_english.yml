l_english:

 giantess_prison.0002.t:0 "On the run in the giant castle"
 giantess_prison.0002.desc:0 "After waiting for the perfect opportunity to escape from my prison, I now find myself navigating the corridors of [imprisoner.GetUINamePossessive] giant castle. As I hide from the watchful eyes of [imprisoner.GetHerHim] guards, I need to leave this treacherous place as soon as possible."
 giantess_prison.0002.a:0 "I need to stay on my guard."
 giantess_prison.0002.desc.a:0 "Sneak your way to freedom"
 giantess_prison.0002.desc.a.success:0 "You manage to escape"
 giantess_prison.0002.desc.a.success.tt:0 "Success"
 giantess_prison.0002.desc.a.fail:0 "You are captured"
 giantess_prison.0002.desc.a.fail.tt:0 "Failure"
 giantess_prison.0002.b:0 "What was the layout of this castle again?"
 giantess_prison.0002.desc.b:0 "Find the quickest way out"
 giantess_prison.0002.c:0 "Nobody shall stop me now."
 giantess_prison.0002.desc.c:0 "Fight anyone who stands in your way"
 giantess_prison.0003.t:0 "Successful escape"
 giantess_prison.0003.desc:0 "Against all odds, I find myself back under the open sky. I escaped any horrifying fate that might have awaited me in [imprisoner.GetUINamePossessive] prison."
 giantess_prison.0003.a:0 "I am free!"
 giantess_prison.0004.t:0 "The tiny fugitive"
 giantess_prison.0004.desc:0 "As my guards enter my chamber, I see "[escapee.GetFirstName] among them. It appears the bug has tried to escape his rightful imprisonment, but failed spectacularly. It now lies upon me to decide the tiny's punishment."
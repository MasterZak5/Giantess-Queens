l_english:

 giantess_random.0001.t:0 "[tiny.GetFirstName] crushed under my ass!"
 giantess_random.0001.desc:0 "I was taking a stroll through my palace and decided to rest a little bit. I carelessly sit on a bench nearby, and I hear a loud pop. When I stand up I see a pool of blood, bones and meat that used to be [tiny.GetFirstName]. [tiny.GetSheHe] had no chance to survive under my ass!"
 giantess_random.0001.desc.a:0 "I'm so sorry, I didn't see you were there!"
 giantess_random.0001.desc.b:0 "Stupid bug, I need to change my dress right now!"
 giantess_random.0002.t:0 "[tiny.GetFirstName] crushed under my shoe!"
 giantess_random.0002.desc:0 "I was taking a stroll through my palace when I heard a loud popping noise. When I lift my foot I see a pool of blood, bones and meat that used to be [tiny.GetFirstName]. [tiny.GetSheHe] had no chance to survive under my shoe!"
 giantess_random.0002.desc.b:0 "Stupid bug! Bring me another pair of shoes right now!"
 giantess_craving.0001.t:0 "Sudden craving"
 giantess_craving.0001.desc:0 "As I walk through my palace, I have a sudden urge to pleasure myself. My eyes fall on [vassal.GetFirstName], and [vassal.GetSheHe] is so tiny and weak [vassal.GetSheHe] can't resist me. But should I really do it?"
 giantess_craving.0001.desc.a:0 "I need to resist my impulses."
 giantess_craving.0001.desc.b:0 "I really want to sit on [vassal.GetHerHim]."
 giantess_craving.0001.desc.c:0 "I really want to crush [vassal.GetHerHim] with my foot."
 giantess_craving.0001.desc.d:0 "I'm so hungry, I will eat [vassal.GetHerHim]!"
 giantess_craving.0001.desc.e:0 "I will smother [vassal.GetHerHim] with my boobs!"
 giantess_craving.0001.desc.f:0 "I will kiss [vassal.GetHerHim]!"
 giantess_craving.0001.desc.g:0 "I will make [vassal.GetHerHim] worship me and crush [vassal.GetHerHim] with my hand!"
 giantess_craving.0002.t:0 "Eating [vassal.GetFirstName]"
 giantess_craving.0002.desc:0 "I quickly grab [vassal.GetFirstName] and move [vassal.GetHerHim] towards my mouth. The tiny is disoriented and scared, [vassal.GetSheHe] begs for mercy! But my belly is growling so loudly and I'm so hungry! I through the tiny into my mouth, suck on [vassal.GetHerHim] a little bit, tasting [vassal.GetHerHis] smell, and then I gulp and send my vassal into the depths of my stomach. My hunger is finally satisfied."
 giantess_craving.0002.desc.a:0 "It's not my fault I was hungry!"
 giantess_craving.0003.t:0 "Eaten by [giantess.GetFirstName]"
 giantess_craving.0003.desc:0 "I was taking a stroll through [giantess.GetUINamePossessive] palace when suddenly she became agitated. She grabbed me into her hand and threw me into her mouth, totally disorienting and surprising me. I beg her to release me, but the giantess is merciless. Soon I descend into the depths of her stomach and become a snack for my voratious liege."
 giantess_craving.0003.desc.a:0 "I shouldn't have come here..."
 giantess_random.0003.t:0 "Fertility window"
 giantess_random.0003.desc:0 "I feel life seeding in my womb. I feel I am becoming fertile and conceiving a child is possible. I should summon my husband as soon as I can so that he impregnates me! Impregnating a giantess is a hard task, though, so our vagina skills will affect the likelihood of success."
 giantess_random.0003.desc.a:0 "Summon him immediately!"
 giantess_random.0003.desc.b:0 "I don't want another child"
 giantess_random.0004.t:0 "Result"
 giantess_random.0004.desc.success:0 "I lay with [tiny.GetFirstName] and insert him into my vagina. The tiny works hard to please me, and eventually manages to satisfy me. As I reach orgasm, the tiny's seed also enters my womb, and our love results in me becoming pregnant."
 giantess_random.0004.desc.fail:0 "I lay with [tiny.GetFirstName] and insert him into my vagina. The tiny works hard to please me, but satisfying a giantess is too hard of a task for a puny tiny. The magic didn't happen, and this pregnancy opportunity is wasted in vain."
 giantess_random.0004.desc.a:0 "New life is growing inside of me..."
 giantess_random.0004.desc.b:0 "I'm sad..."
 giantess_random.0005.t:0 "[giantess.GetFullName] is fertile"
 giantess_random.0005.desc.success:0 "My giantess wife, [giantess.GetFirstName], summons me before herself. She tells me she feels she is fertile and it's a perfect opportunity for me to impregnate her. She places me into her vagina and I work hard to satisfy her. I give her a good tumble, and soon she receives orgasm. I send my seed into her womb, and so a new life starts developing inside her body."
 giantess_random.0005.desc.fail:0 "My giantess wife, [giantess.GetFirstName], summons me before herself. She tells me she feels she is fertile and it's a perfect opportunity for me to impregnate her. She places me into her vagina and I work hard to satisfy her. Unfortunately, my efforts were inadequate, and so the magic didn't happen. [giantess.GetFirstName] is visibly sad."
 giantess_random.0005.desc.a.success:0 "I will be a father!"
 giantess_random.0005.desc.a.fail:0 "I failed her..."
 giantess_random.0006.t:0 "Bored at the council"
 giantess_random.0006.desc:0 "I am mightly bored during a council session, playing with my chalice of wine and swirling the liquid while the other giantess and tinies read to me reports from all over my domain. Well, it's more of a bathtub than a chalice to these tinies. [tiny.GetFirstName] catch my eye, and i pick up the distracted tiny before dropping him in my wine. I can see [tiny.GetFirstName] panicking, and with a smile i bring the goblet to my mouth, drinking the wine and tiny together. I feel with satisfation [tiny.GetFirstName] sliding down my throat, squirming down until he splash in my stomach."
 giantess_random.0006.desc.a:0 "Oh Goddess, what have i done?"
 giantess_random.0006.desc.b:0 "Delicious..."

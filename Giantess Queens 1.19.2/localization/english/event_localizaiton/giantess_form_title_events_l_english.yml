l_english:

 titanes_formation.0001.t: "The Titanesses of Greece"
 titanes_formation.0001.desc.intro: "In the days of Ancient Greece, the people believed in ancient gods called titans, born from Gaia and Uranus, who ruled over man before their children usurped and imprisoned them in Tartarus. Amongst these primordial gods were the titanesses, whom remained neutral during the titanomachy and later joined the Olympian gods."
 titanes_formation.0001.desc.greeks: "\n\nIt cannot be a mere coincidence that our own physiques resemble those of the titanesses so closely. There must be some link between our race and the titanesses of legend. They must be our ancient pure-blooded ancestors who lived before the fall of our race!\n\nWe could rebuild the pantheon and retake our rightful place as the gods of ancient Greece."
 titanes_formation.0001.desc.other: "\n\nOur physiques as giantesses greatly resemble these titanesses in ancient myths. Perhaps they had some grain of truth to them, or not, but they can grant our giantess kin rightious and devine right to rule over the lands of ancient Greece if we give these myths substance and embody the titanesses."
 titanes_formation.0001.a: "Resurrect the Pantheon!"
 titanes_formation.0001.b: "It's not right to immitate gods..."
 titanes_formation.0001.c: "This is all wrong!"
 titanes_formation.0002.t: "The New Old Gods"
 titanes_formation.0002.desc: "After conquering the ancient seats of Greek power, we have established ourselves as the embodiment of the ancient titanesses told of in old Greek mythology. The mortals used to fear our existence, but they now know we are their rightful gods.\n\n#EMP A new age for giantesses has begun!#!"
 titanes_formation.0002.a: "Just so!"
 titanes_formation.0003.t: "The New Queens of Greece"
 titanes_formation.0003.desc: "After conquering the ancient seats of Greek power, our dominance over the Aegean sea can no longer be contested. The tinies may fear us, but they know we are in control.\n\n#EMP A new age for giantesses has just begun!#!"
 titanes_formation.0003.a: "Let them marvel at our power!"
 titanes_formation.0004.t: "The New Queens of Greece"
 titanes_formation.0004.desc: "News has come warning of the power that grows in the Aegean.\nGiantesses have conquered much of Greek lands and have established themselves as absolute rulers over mortal men. Their strength is now too great to take lightly. If they turned their sights towards our lands, would we be able to stop them?\n\nMany expected great turnmoil when the Giantesses first emerged, but none could have expected this.\nThere is no telling what they will do next. Perhaps it marks the beginning of a new era under the rule of Giantesses."
 titanes_formation.0004.a: "#EMP The age of man is over...#!"

 jotunheim_formation.0001.t: "The Jotuns of Jötunheimr"
 jotunheim_formation.0001.desc.intro: "Norse legend tells tales of the enemy of Asgard, the Jotuns, giant beings born in frost, who rule over Jötunheimr. Their strength rivalled even that of the great gods Odin and Thor, and their final battle with the Asgardians is said to be what will bring the world to destruction."
 jotunheim_formation.0001.desc.nordic: "\n\nIt cannot be a mere coincidence that our own physiques resemble those of the Jotun so closely. There must be some link between our race and the Jotuns of Norse legend. They must be our ancient pure-blooded ancestors who lived before the fall of our race!\n\nIt's hard to say if the original Jotuns are still around to threaten Midgard, but we are in a prime position to capitalise off their influence over the Norse mortals. If we convince them we are the Jotun of legend, who would dare stand against us?"
 jotunheim_formation.0001.desc.other: "\n\nOur physiques as giantesses greatly resemble these Jotuns in ancient myths. Perhaps they had some grain of truth to them, or not, but we can make use of their infamy to strike fear into the Norse tinies and keep them in line under our rule."
 jotunheim_formation.0001.a: "Bring Jötunheimr to Midgard!"
 jotunheim_formation.0001.b: "It's not right to immitate gods..."
 jotunheim_formation.0001.c: "This is all wrong!"
 jotunheim_formation.0002.t: "The New Old Gods"
 jotunheim_formation.0002.desc: "After conquering the far north of Scandenavia, we have established a new realm befitting the namesake Jötunheimr for our giantess kin to live in. Now the mortals fear us not only as giantesses, but as their true and dreadful gods.\n\n#EMP A new age for giantesses has begun!#!"
 jotunheim_formation.0002.a: "Just so!"
 jotunheim_formation.0003.t: "The New Queens of the North"
 jotunheim_formation.0003.desc: "After conquering the frozen wastes of northern Scandenavia, we truly have established a realm not unlike the Jötunheimr of legend. The tinies may fear us, but they know we are in control.\n\n#EMP A new age for giantesses has just begun!#!"
 jotunheim_formation.0003.a: "Odin won't save them from us this time!"
 jotunheim_formation.0004.t: "The New Queens of the North"
 jotunheim_formation.0004.desc: "News has come warning of the power that grows in Scandenavia.\nGiantesses have conquered much of the far north and have established themselves as absolute rulers over mortal men. Their strength is now too great to take lightly. If they turned their sights towards our lands, would we be able to stop them?\n\nMany expected great turnmoil when the Giantesses first emerged, but none could have expected this.\nThere is no telling what they will do next. Perhaps it marks the beginning of a new era under the rule of Giantesses."
 jotunheim_formation.0004.a: "#EMP The age of man is over...#!"
l_english:

 giantess_religion.0001.t:0 "The merchant arrives"
 giantess_religion.0001.desc:0 "The merchant arrived into my palace and starts telling me about the map — "I present to you the map which indicates the location of an ancient temple holding great secrets and immense power! Unfortunately, it's written in an ancient language which I don't understand. I bought this map from another merchant and it cost me a fortune! I expect to receive some coin from selling it to you!" This man is most likely fooling me, but for some reason I have a feeling it's not that simple. But should I part with my honestly earned gold just for this map that I can't even read?"
 giantess_religion.0001.desc.a:0 "Let him have his coin, but woe on me if he's pulling my leg!"
 giantess_religion.0001.a.tt:0 "You gain the map. Now you need to decipher it."
 giantess_religion.0001.desc.b:0 "Do you really think I'm that stupid? Guards, get this conman out of my castle!"
 giantess_religion.0002.t:0 "Deciphering the map"
 giantess_religion.0002.desc:0 "I can see some familiar shapes at the map, but the exact location of this temple eludes me. With enough effort, though, it could be possible to solve this mystery."
 giantess_religion.0002.desc.a:0 "I'll spend some of my free time trying to decipher it."
 giantess_religion.0002.desc.b:0 "I'll focus my whole mind on this task!"
 giantess_religion.0002.a.success.tt:0 "Success"
 giantess_religion.0002.a.success:0 "I successfully decipher the map."
 giantess_religion.0002.a.falure.tt:0 "Fail"
 giantess_religion.0002.a.falure:0 "I fail to decipher the map."
 giantess_religion.0003.t:0 "Success!"
 giantess_religion.0003.desc:0 "Your efforts paid off! You successfully deciphered the map and now you know the location of the temple. You don't know what awaits you, so you should prepare befoe venturing forth (recommended prowess 15 or more)."
 giantess_religion.0003.desc.a:0 "Good!"
 giantess_religion.0004.t:0 "Fail!"
 giantess_religion.0004.desc:0 "You tried hard to decipher the map but nothing worked. Perhaps you should try again in a few years and read some books in the meantime (try increasing your learning before attempting once more)."
 giantess_religion.0004.desc.a:0 "Oh well, better luck next time."
 giantess_religion.0005.t:0 "Arriving into the temple"
 giantess_religion.0005.desc:0 "After a few days of travelling, I finally arrive to my destination. I see a small entrance to the cave and decide to explore it. Surprisingly, the cave soon widens and becomes extremely huge. I feel bad about going so deep, but I decide to press on. Fortunately, the path seems pretty clear, and it actually feels more like a road.\n\nThe cave is too huge and I have to spend a night recuperating my strength. After a few more hours of walking the environenment gradually changes. It appears to be more and more artitificial until I finally see a huge statue. Could this really be the place that holds the secrets of the past? I continue moving and I finally arrive to what appears to be a temple.\n\nThe size of this shrine is truly magnificent. I'm surrounded by huge statues, but for some reason all of them appear to be female. Could this be a shrine to some ancient pagan goddess? Perhaps I will find the answers further in this temple.\n\nBut suddenly a loud bang catches my attention. Another one two seconds later. The noise gets louder, now it's more like a thunder and the ground starts shaking. One more deafening rattle and I wall on the ground, unable to preserve balance. When I turn over I finally see the source of this noise, and I can't believe my eyes! A towering woman is quickly approaching me. She's fully naked, and I can't help but admire the size and beauty of her body, since I've never seen anything like this before! I start running but my pace is no match for the gargantuan stranger and soon I'm again on my knees, and a huge shadow obscures the light of the Sun shining through the holes in the roof of the cave.\n\n"Well-well, what do we have here," says the giantess. "I'm impressed that you managed to get that far, but I'm afraid your journey ends here." The giantess lifts her foot and quickly starts lowering it on me! I must run before she crushes me with her massive foot!"
 giantess_religion.0005.desc.a:0 "Run, I won't survive the pressure of her foot!"
 giantess_religion.0005.desc.a.success.tt:0 "Success"
 giantess_religion.0005.desc.a.success:0 "You successfully avoid her foot."
 giantess_religion.0005.desc.a.fail.tt:0 "Fail"
 giantess_religion.0005.desc.a.fail:0 "You are crushed under her massive foot!"
 giantess_religion.0006.t:0 "Crushed under foot!"
 giantess_religion.0006.desc:0 "I try to run but I'm simply not fast enough. The giantess lowers her foot and pins me down. She giggles and tells me how worthless I am. She slowly increases pressure and soon I feel my bones breaking. The pain is too much for me to handle, and my life starts leaving me. Soon I lose consciousness and become a stain on the giantess's sole."
 giantess_religion.0006.desc.a:0 "I should have stayed home..."
 giantess_religion.0007.t:0 "Escaping the giantess's foot"
 giantess_religion.0007.desc:0 "My training and physical agility have paid off, and I start running as fast as I can. The thunderous clash of the giantess's foot and the temple's floor deafens me and sends me flying a couple of feet away from the epicentre of the crash. "You are tougher then I thought," the giantess says and as I raise my eyes I can see the smirk on the woman's face. We both understand there is no chance for me to win this fight, I'm simply powerless against such a behemoth of a woman. She quickly sits on the ground and the clapping of her buttcheeks as they land on the surface of the temple feel like a thunderstorm. The massive creature stretches out her hand and grabs me. I'm unable to resist her strength, as my whole body is merely the size of her middle finger. Soon she opens her palm and I see her mouth right in front of me!\n\n"Listen, bug, I'm really hungry, but I also haven't been pleasured in years. Bugs like you came here before, and no one was able to satisfy me properly. I'll give you a chance to show me how much of a knight you are. I really love it when tinies struggle in my mouth. Struggle well enough, and I might reward you, although I doubt you'll be able to do anything. Fail, and you'll become my snack. Becoming part of my body is a privilege you should be begging for!" After that she quickly puts me into her mouth and starts pressing me towards her throat. I must do something to avoid being eaten alive!"
 giantess_religion.0007.a:0 "Use your physical strength to resist her"
 giantess_religion.0007.desc.a:0 "You struggle hard in order to satisfy her. Arrogant giantesses don't really like defiance."
 giantess_religion.0007.desc.a.success.tt:0 "Success"
 giantess_religion.0007.desc.a.success:0 "You successfully satisfy the giantess"
 giantess_religion.0007.desc.a.fail.tt:0 "Fail"
 giantess_religion.0007.desc.a.fail:0 "You fail to properly satisfy the giantess"
 giantess_religion.0007.b:0 "Offer worshipful words to satisfy the giantess"
 giantess_religion.0007.desc.b:0 "You use your diplomacy skills to satisfy the giantess. Arrogant giantesses will like it, but it will have less effect on sadistic and callous ones."
 giantess_religion.0008.t:0 "Swallowed by the giantess!"
 giantess_religion.0008.desc_struggle:0 "I struggle hard to resist the giantess's tongue and not a fall into her belly. I hope I have enough physical strength to survive long enough for the giantess to let me go."
 giantess_religion.0008.desc_worship:0 "I concentrate on offering the giantess some worshipful words, hoping that will please her and she will let me go."
 giantess_religion.0008.desc:1 "\n\nUnfortunately, the giantess wasn't pleased enough with my efforts, and soon I fall into the deep abyss of her belly. It's very dark here and the sound of her heartbeat and bowel movement overwhelm me. Her stomach walls are slippery and the acid burns my skin. I can barely hear the giantess saying that I wasn't struggling hard enough and so my destiny is to become her food. Soon the pain and the rumbling noise become unbearable, and I start losing consciousness. I will never wake up again, and my body will be digested by the giantess just like the dozens of other fools who dared to venture this far."
 giantess_religion.0008.desc.a:0 "Eternal sleep..."
 giantess_religion.0009.t:0 "Giantess satisfied"
 giantess_religion.0009.desc:1 "\n\nThe giantess seems satisfied with my efforts, as she soon takes me out of her mouth and puts me on her shoulder. I look around myself and see a few other giantesses gathered around. What is this place and how do these giantesses sustain themselves?\n\n"You have surprised me, little one. I suppose you have a lot of questions, and I will satisfy your interest. Let's go to the altar, hold on tight!" As I cling onto the giantesses mighty shoulder, she tells me about the origins of the Earth and about its history. It turns out the gods we mortals believe in are false! The Earth was created by a goddess called Allmother, and she created it for the giantess race to live on. The original giantesses were immortal and pure, they treated nature with love and care. However, the giantesses soon became complacent, lazy and bored, because they faced no challenges in their endless lives. Allmother decided to spice things up by creating the tiny race, which we humans are part of. The tiny race was mortal and had flaws, they were often greedy, callous, lustful and cruel, unlike their pure giantess counterparts.\n\nGiantesses and tinies lived in peace until one giantess fell in love with the male tiny chief, who tricked her into copulation. The seed of the chief entered the giantess's womb, and she gave birth to twins, the female one was a giantess like her mother, and the male one was a tiny like his father. When the other giantesses learned about this they became curious and also started falling in love with the tinies, both males and females, and the tinies took advantage of their naivety. However, by commiting this sin and going against the Allmother's design, giantesses muddled their blood with the flawed tiny blood. The giantesses born from such unions were mortal and had flaws just like the tinies. Many of these giantesses were cruel and lustful just like their fathers, and they used their size to torture tinies and forced them to pleasure them sexually. The mudblood giantesses soon outnumbered the First Born giantesses and killed them, because they envied their immortality. The Earth descended into chaos as the giantesses proceeded to eliminate both each other and the tinies, but after a few centuries of struggle giantesses vanished for unknown reasons. Tinies became the dominant race on the Earth, and some of them still carry the genes of their immortal ancestors. It turns out the few giantesses left were banished to this temple by the tiny armies, and the main exit was sealed. The giantesses survive and reproduce thanks to the local tinies who enter the temple via the cave in search of hidden treasures. Even though no one ever comes back, the fools are still abundant!\n\n"Here's the altar. Wait, why is it glowing. Could it be..." The giantess puts me on the altar, and there's a sudden burst of energy from it. I hear a loud sound and turn my head, and I see a large door opening. The sun is shining on the other side.\n\n"Impossible! You are the promised one!" The giantess tells me that there's a prophecy of a tiny carrying a lot of giantess blood who one day will open the door to the temple. The giantesses will then come out and reestablish their position and achieve immortality once more."
 giantess_religion.0009.desc_female:1 "\n\nBut that's not the whole story! Since I am female and carry so much giantess blood, the giantesses can bestow their gift on me and make me a giantess like them! I will then lead them to prosperity once again. "But if you don't want to be our leader, I will have to take your place. The prophecy is unfolding before our eyes, and somebody has to lead us to the new golden age. I will take possession of your realm and you will be my loyal vassal right by my side. The choice is yours, but there's no way back now. The door is open and we will not stay here any longer.""
 giantess_religion.0009.desc_male:1 "\n\n"The prophecy unfolds before our eyes, and we have to fulfill it. The door is open and there is no way back for any of us. I will take possession of your realm and you will be my loyal vassal right by my side. In gratitude for your contribution to us, I will take you as my husband and our children will bear the name of your house. I'm afraid you aren't allowed to refuse this offer.""
 giantess_religion.0009.desc.a:0 "I will become a giantess and lead you!"
 giantess_religion.0009.desc.b:0 "I will swear fealty to you as my giantess!"
 giantess_religion.00010.t:0 "The return of the giantesses"
 giantess_religion.00010.desc:0 "Giantess reads a spell, and I instantly start feeling strange. I feel magical energy boiling and me, and suddenly the ground gets distant. I'm growing! In a minute I have grown to the size of the other giantesses. Now I'm one of them.\n\nI walk out of the temple, the other giantesses are accompanying me. One of them is carrying a tiny chest, but the amount of gold in it is huge from mortal perspective. Together with my companions I walk towards the capital, and it takes a mere hour to traverse the distance that took me a few days before. I arrive to the capital, and the locals are amazed and scared. I recite the history of the world told to me by the giantess in the temple. The people fall on their knees and swear allegiance to me. In a few days the news spread all around the country and beyond, and soon an army of worshipphers gathers outside the capital walls. A huge work awaits me. A new, much larger castle needs to be built for me and my companions. Some of my vassals accepted the new state of affairs, but others are shocked and are preparing a revolt. Neighbouring rulers are already gathering their troops against me. The fate of both the mankind and the giantess races is in my hands. Will the giantesses rule this planet like in the old days, or will they perish once again?"
 giantess_religion.00010.desc.a:0 "Time to conquer!"
 giantess_event_troops:0 "Giantess worshipping army"
l_english:

 giantess_siege.0001.t:0 "Fate of [county.GetName]"
 giantess_siege.0001.desc:0 "[barony.GetName] falls down to me, and I triumphantly enter the settelement. I tower above the puny houses of this city, not even speaking about the pathetic inhabitants who dared to oppose me. Their lives are now in my hands, as are the lives of other residents of this county. Should I spare them and let them live? Or should I grant them the privilege of being my slaves and serving me?"
 giantess_siege.0001.evil.desc:0 "On the other hand, it would be so much fun to just destroy this whole city and kill its inhabitants. This will show everyone that opposing me is futile!"
 giantess_siege.0001.a:0 "I will let them be, I could use this land with its inhabitants"
 giantess_siege.0001.b:0 "They will be enslaved and will serve me"
 giantess_siege.0001.c:0 "Time to die, little bugs!"
 giantess_siege.0002.t:0 "[county.GetName] enslaved"
 giantess_siege.0002.desc:0 "The citizens of [barony.GetName] gather on the cental square and kneel before me, begging for mercy. I announce that I have decided to spare their lives, but from now on they will serve me as slaves. The little bugs scream as they are dragged out of the city by my soldiers, but I know they will soon come to terms with their fate and will become my loyal servants. Soon the city is left empty, as well as most villages of [county.GetName]. It will take a while for this province to recover, but that's what you get for opposing me. Overall [ROOT.Var('slaves_number_increase').GetValue] people were taken as slaves."
 giantess_siege.0002.a:0 "You're now my slaves."
 giantess_siege.0003.t:0 "[county.GetName] rampaged"
 giantess_siege.0003.desc:0 "The citizens of [barony.GetName] gather on the cental square and kneel before me, begging for mercy. A mischievous grin appears on my face, and then I suddenly start destroying everything in sight. The houses crumble under my weight when I sit on them, squashing the people hiding there with my ass. My every step creates a small earthquake and destroys the streets that these bugs have been building for so many years. The people are trying to run away, but I grab them into my hand a few at a time and throw them down my belly, dooming them to a slow and painful death. After a few hours of rampage, what used to be a sprawling city is turned into ruins, and its inhabitants are either digested in my belly or crushed under the weight of my enormous body. Today [ROOT.Var('slaves_number_increase').GetValue] people lost their lives because of my wrath. My ruthlessness is going to be known all around the world!"
 giantess_siege.0003.a:0 "That's what you get for defying me!"
 giantess_siege.0004.t:0 "Captured by [giantess.GetFullName]"
 giantess_siege.0004.desc:0 "The garrison of [barony.GetName] surrenders and [giantess.GetFullName] enters the city unhindered, crushing a few houses and breaking the road on her way. The citizens are crying and begging for mercy, and there's nothing I can do to stop this giantess from getting what she wants. She announces that she decided to spare us and instead of killing us all she will make us her slaves. Her soldiers start dragging everyone ouf the city while women and children weep. Someone recognizes me as a noble and so I'm soon thrown into [giantess.GetFullNamePossessive] dungeon, awaiting my fate."
 giantess_siege.0004.a:0 "There was nothing I could do..."
 giantess_siege.0005.t:0 "Killed by [giantess.GetFullName]"
 giantess_siege.0005.desc:0 "The garrison of [barony.GetName] surrenders and [giantess.GetFullName] enters the city unhindered, crushing a few houses and breaking the road on her way. The citizens are crying and begging for mercy, and there's nothing I can do to stop this giantess from getting what she wants. She grins mischievously before se starts rampaging and destroying the city."
 giantess_siege.0005.swallow.desc:0 "I'm trying to run away, but [giantess.GetFullName] closes in. She gets down on all fours and starts grabbing people a few at a time and throwing them into her mouth. I panic and run as fast as I can, but I can't escape. [giantess.GetFullName] catches me and throws me into her mouth along with other people. She then gulps and we are sent into her belly, where dozens of other tinies are already being digested. The smell is unbearable and the screams of tinies who are being melted by the stomach acid are truly terrifying. We punch the walls of [giantess.GetFullNamePossessive] belly, but it's pointless. A few hours later the screams fade away, and it seems the giantess has stopped her rampage. Soon I'm completely digested by the giantess's belly and become fat on her ass. What a miserable way to end life..."
 giantess_siege.0005.ass.desc:0 "I run into a church along with other tinies, hoping that we can wait out this disaster out of her sight. Unfortunately, a few minutes later a terrifying noise can be heard as the giantess approaches our sanctuary. For a few moments, there was complete silence. Then suddenly the roof of the church starts cracking and breaking, and we realize that the giantess has sat down on it! A couple of seconds later the roof breaks completely and a few megatons of womanhood descend on us and crush us to a pulp. We all became a bloody stain on [giantess.GetFullNamePossessive] ass!"
 giantess_siege.0005.shoecrush.desc:0 "I try to run away, but it's pointless, [giantess.GetFullNamePossessive] foot is drawing near. Soon an imposing shadow completely covers me, and I understand that her foot is descending on me. I have no chance to escape, and a second later my body is completely crushed under the giantess's shoe."
 giantess_siege.0005.a:0 "This is hell on Earth!"
 giantess_siege.0006.t:0 "Slaves captured"
 giantess_siege.0006.desc:0 "[raider.Var('slaves_number_increase').GetValue] slaves captured while raiding"
l_english:

 activity_giantess_feast:0 "Giantess feast"
 activity_giantess_feast_name:0 "[ACTIVITY.GetOwner.GetNamePossessiveOrMy|U] Giantess Feast"
 activity_giantess_feast_desc:0 "Every giantess of stature in the realm has been invited to a great feast, to eat tinies together."
 activity_giantess_feast_owner:0 "Hostess"
 activity_giantess_feast_guest_help_text:0 "The fair ladies you invited to your supple feast"
 giantess_feast_phase:0 "socializations between snacks"
 activity_giantess_feast_conclusion_desc:0 "Through snacks and courses, the feast concluded with full bellies and happy ladies!."

 giantess_feast.0006.message.t:1 "[giantess.GetFirstName] eats [tiny.GetFirstName]"
 giantess_feast.0006.message.desc:1 "[giantess.GetFirstName] has eaten [tiny.GetFirstName] during the feast."
 giantess_feast.0001.desc:0 "As my fellow giantess, I invite you to a giantess-only feast. I'll gladly share the tinies that I have as food."
 giantess_feast.0001.a:0 "A party, yay!"
 giantess_feast.0001.b:0 "I don't really feel like it..."
 giantess_feast.0002.t:0 "No one arrived to my party"
 giantess_feast.0002.desc:0 "Sadly, no giantess arrived to my party."
 giantess_feast.0002.a:0 "Fools, more food left for me!"
 giantess_feast.0004.t:0 "The party starts!"
 giantess_feast.0004.desc:0 "All the giantesses have gathered at [host.GetNamePossessiveOrMy|U] place and are ready to start the feast. Hundreds of tiny servants are carrying plates with food, including quite a few tasty tinies. Today I'll eat some tasty food and will have a chance to chat with my fellow big girls!"
 giantess_feast.0004.a:0 "I can't wait to taste them!"
 giantess_feast.0005.t:0 "Eating [tiny.GetFirstName]"
 giantess_feast.0005.desc:0 "The giantess's massive hand descends, wrapping around [tiny.GetFirstName] with a gentle yet firm grip. She lifts them effortlessly, their tiny form barely visible within her colossal palm. With a predatory gleam in her eyes, she brings them closer to her mouth, her lips parting to reveal a cavernous maw. The tiny struggles futilely, their screams echoing through the hall as they are slowly engulfed by her hunger. The crowd watches in a mix of horror and fascination, some cheering at the savage display, others turning away in disgust. The giantess savors the moment, her eyes rolling back as she swallows, feeling the tiny's final resistance fade away."
 giantess_feast.0005.a:0 "So tasty!"
 giantess_feast.0006.t:0 "Eaten at the feast!"
 giantess_feast.0006.desc:0 "Guards wake me up and get me out of my cell. I don't understand what's going on. Then they remove my clothes and place me on a giant plate, and they season me with different herbs and salt. What is happening, this cannot be possible?! A dozen tinies lift the plate and carry it into what appears to be a dining room, since I see lots of giantesses talking and laughing. They they climb the table via a ladder and put me in front of [giantess.GetFirstName]. She smiles and smacks her lips, and I feel like a bug in this room fool of giantesses. [giantess.GetFirstName] grabs me and puts me into her mouth, I'm unable to resist the strength of this gigantic creature. After licking me with her tongue for half a minute, she gulps and I descend into the dark. When I land in her belly, I see a few other tinies and a lot of food around myself. Today we will all be digested by the giantess and will become part of her body."
 giantess_feast.0006.a:0 "What a horrible way to die!"
 giantess_feast.5003.t:0 "Host has died, party is over"
 giantess_feast.5003.desc:0 "Host has died, party is over."
 giantess_feast.5003.a:0 "That's a bummer"
 giantess_feast.5004.t:0 "I'm imprisoned, the party is over"
 giantess_feast.5004.desc:0 "I'm imprisoned, the party is over."
 giantess_feast.5004.a:0 "That's a bummer"
 giantess_feast.5005.t:0 "Host imprisoned, party is over"
 giantess_feast.5005.desc:0 "Host imprisoned, party is over"
 giantess_feast.5005.a:0 "That's a bummer"
 giantess_feast.9001.t:0 "End of feast"
 giantess_feast.9001.desc:0 "The party has ended, and it's time to say goodbye to my fellow giantesses. I've gained quite a lot of weight during this event!"
 giantess_feast.9001.a:0 "Until next time!"

 giantess_feast.1000.desc:0 "I'm gathering a party with my fellow giantesses, and I will need a lot of food to feed them. As my vassal, you have a duty to supply your mistress with food. If you can't send any men, you must come yourself and sacrifice your life so that we stay nourished. Remember that not fulfilling this duty is a crime, and will be punished."
 giantess_feast.1000.a:0 "I will send my peasants to you"
 giantess_feast.1000.a.message.t:0 "[vassal.GetFirstName] sends peasants"
 giantess_feast.1000.a.message.desc:0 "[vassal.GetFirstName] sends his peasants!"
 giantess_feast.1000.b:0 "I will send my prisoners to you"
 giantess_feast.1000.b.message.t:0 "[vassal.GetFirstName] sends prisoners"
 giantess_feast.1000.b.message.desc:0 "[vassal.GetFirstName] sends his prisoners!"
 giantess_feast.1000.c:0 "I want to be eaten by a giantess!"
 giantess_feast.1000.c.message.t:0 "[vassal.GetFirstName] comes himself"
 giantess_feast.1000.c.message.desc:0 "[vassal.GetFirstName] sacrifices his life to feed the giantesses!"
 giantess_feast.1000.d:0 "I will not send anything to you!"
 giantess_feast.1000.d.message.t:0 "[vassal.GetFirstName] neglects his duty"
 giantess_feast.1000.d.message.desc:0 "[vassal.GetFirstName] refuses to send anyone, [vassal.GetSheHe] is now a criminal!"
l_german:

 giantess_skill.0001.t:0 "Meine Statistiken"
 giantess_skill.0001.desc.opening.gentle:0 "Ich bin eine sanfte Riesin."
 giantess_skill.0001.desc.opening.evil:0 "Ich bin eine böse Riesin."
 giantess_skill.0001.desc.opening.neutral:0 "Ich bin eine neutrale Riesin."
 giantess_skill.0001.desc:0 "Ich spezialisiere mich in [ROOT.Char.Custom('GiantessPreference')]. Meine Blutkraft ist [ROOT.Var('giantess_blood_power').GetValue]. \n\nArsch-Fähigkeit — [ROOT.Var('ass_skill').GetValue]. Fuß-Fähigkeit — [ROOT.Var('foot_skill').GetValue]. Vore-Fähigkeit — [ROOT.Var('vore_skill').GetValue]. Brüste-Fähigkeit — [ROOT.Var('boobs_skill').GetValue]. Vagina-Fähigkeit — [ROOT.Var('vagina_skill').GetValue].\n\nIch habe [ROOT.Var('giantess_mana').GetValue] Mana-Punkte. Ich habe [ROOT.Var('slaves_number').GetValue] Sklaven."
 giantess_skill.0001.a:0 "OK"
 giantess_skill.0003.t:0 "Meine Spezialisierung wählen"
 giantess_skill.0003.desc:0 "Ich bin jetzt eine erwachsene Riesin und kann meine Spezialisierung wählen. Ich werde 25 Bonuspunkte für diese Fähigkeit erhalten und jeder wird wissen, dass dies meine stärkste und beliebteste Fähigkeit ist."
 giantess_skill.0003.a:0 "Ich werde die Kunst des Arsches studieren!"
 giantess_skill.0003.a.tooltip:0 "Du wirst dich auf den Arsch spezialisieren."
 giantess_skill.0003.b:0 "Ich werde den Umgang mit den Füßen meistern!"
 giantess_skill.0003.b.tooltip:0 "Du wirst dich auf den Fuß spezialisieren."
 giantess_skill.0003.c:0 "Ich möchte das volle Potenzial meines Mundes und meines Bauches ausschöpfen!"
 giantess_skill.0003.c.tooltip:0 "Du wirst dich auf Vore spezialisieren."
 giantess_skill.0003.d:0 "Meine Brüste werden mein größter Vorzug sein!"
 giantess_skill.0003.d.tooltip:0 "Du wirst dich auf Brüste spezialisieren."
 giantess_skill.0003.e:0 "Ich werde meine Vagina zu ihrer vollen Stärke trainieren!"
 giantess_skill.0003.e.tooltip:0 "Du wirst dich die Vagina spezialisieren."
 giantess_skill.0005.t:0 "Meine Spezialisierung wählen"
 giantess_skill.0005.desc:0 "Als kleiner Winzling, der von großen und mächtigen Riesinnen umgeben ist, muss ich ihre Körper studieren, um ihnen zu widerstehen oder ihnen zu dienen. Welche Körperteile von Riesinnen faszinieren mich am meisten? Für diese Fähigkeit erhalte ich 25 Bonuspunkte und jeder wird meine Vorliebe für diesen Aspekt kennen."
 giantess_skill.0005.a:0 "Ihren prallen Ärschen kann ich nicht widerstehen!"
 giantess_skill.0005.b:0 "Ihre riesigen, königlichen Füße lassen mich erschauern!"
 giantess_skill.0005.c:0 "Ihre Münder und Bäuche locken mich!"
 giantess_skill.0005.d:0 "Ihre üppigen Brüste sind meine Schwäche und Stärke zugleich!"
 giantess_skill.0005.e:0 "Ich werde sie erobern, indem ich mich um ihre Muschis kümmere!"
 giantess_skill.0006.t:0 "Meine verborgenen Verlangen kennenlernen"
 giantess_skill.0006.desc:0 "Als Winzling in einer von Riesinnen dominierten Gesellschaft kann ich nicht anders, als sie majestätisch, mächtig und schön zu finden, wenn auch gefährlich und oft grausam und zerstörerisch. Ich werde mit ihnen klarkommen und ihren Befehlen Folge leisten müssen, ob ich nun vorhabe, sie auszuführen oder nicht. Ich fange an, meine verborgenen Gelüste zu entdecken, und bestimmte Aspekte ihrer Körper sind für mich leichter zu verstehen als andere."
 giantess_skill.0006.a:0 "Ich bin bereit, mich mit einer Riesin zu beschäftigen"
 giantess_skill.0006.a.tooltip:0 "Deine Fähigkeiten stehen nun fest und deine Ausrichtung ist bestimmt. Klicke auf die Entscheidung „Meine Statistiken prüfen“, um das Ergebnis anzuzeigen."
 giantess_skill.0007.t:0 "Erwachsen werden"
 giantess_skill.0007.desc:0 "Ich bin jetzt eine erwachsene Riesin und spüre, wie sich Kraft und Verlangen in mir aufbauen. Ich verspüre plötzlich den Wunsch, Winzlinge zu erforschen und meinen eigenen Körper besser kennenzulernen."
 giantess_skill.0007.a:0 "Ich bin bereit, eine echte Riesin zu werden"
 giantess_skill.0008.t:0 "[recipient.GetFirstNamePossessive] Statistiken"
 giantess_skill.0008.desc:0 "[recipient.Custom('GiantessDescription')]"
 giantess_skill.0008.desc.a:0 "Interessant"
 giantess_skill.0009.desc:0 "[recipient.Custom('TinyDescription')]"
 giantess_skill.0010.desc:0 "Ich spezialisiere mich in [ROOT.Char.Custom('GiantessPreference')].\n\nArsch-Fähigkeit — [ROOT.Var('ass_skill').GetValue]. Fuß-Fähigkeit — [ROOT.Var('foot_skill').GetValue]. Vore-Fähigkeit — [ROOT.Var('vore_skill').GetValue]. Brüste-Fähigkeit — [ROOT.Var('boobs_skill').GetValue]. Vagina-Fähigkeit — [ROOT.Var('vagina_skill').GetValue].\n\nIch habe [ROOT.Var('tiny_loyaty').GetValue] Treuheits-Punkte."
 giantess_skill.0011.t:0 "Meine Ausrichtung wählen"
 giantess_skill.0011.desc:0 "Es ist Zeit für mich, zu entscheiden, welchen Weg ich als Riesin einschlagen werde. Sanfte Riesinnen nutzen ihre Körperteile, um Winzlinge zu bezaubern und sie süchtig nach ihrer Schönheit zu machen. Sie erlangen Lust und Mana, indem sie die Wünsche der Winzlinge befriedigen. Böse Riesinnen hingegen nutzen ihre Größe, um Winzlinge zur Unterwerfung zu zwingen. Sie erlangen Lust und Mana, indem sie Winzlinge Schmerzen zufügen."
 giantess_skill.0011.desc.a:0 "Ich werde den Wegen der sanften Riesinnen folgen"
 giantess_skill.0011.desc.b:0 "Ich werde den Wegen der bösen Riesinnen folgen"
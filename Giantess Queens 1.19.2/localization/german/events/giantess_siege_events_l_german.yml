l_german:

 giantess_siege.0001.t:0 "Schicksal von [county.GetName]"
 giantess_siege.0001.desc:0 "[barony.GetName] fällt vor mir und ich betrete triumphal die Siedlung. Ich überrage die mickrigen Häuser dieser Stadt und erwähne nicht einmal die erbärmlichen Einwohner, die es wagten, sich mir entgegenzustellen. Ihr Leben liegt nun in meinen Händen, ebenso wie das Leben anderer Bewohner dieser Grafschaft. Soll ich sie verschonen und am Leben lassen? Oder soll ich ihnen das Privileg gewähren, meine Sklaven zu werden und mir zu dienen?"
 giantess_siege.0001.evil.desc:0 "Andererseits würde es so viel Spaß machen, einfach die ganze Stadt zu zerstören und ihre Bewohner zu töten. Das würde allen zeigen, dass es sinnlos ist, sich mir entgegenzustellen!"
 giantess_siege.0001.a:0 "Ich werde sie in Ruhe lassen, ich könnte dieses Land mit seinen Bewohnern gebrauchen."
 giantess_siege.0001.b:0 "Sie werden versklavt und werden mir dienen."
 giantess_siege.0001.c:0 "Zeit zu sterben, kleine Käfer!"
 giantess_siege.0002.t:0 "[county.GetName] versklavt"
 giantess_siege.0002.desc:0 "Die Bewohner von [barony.GetName] versammeln sich auf dem zentralen Platz, knien vor mir nieder und flehen um Gnade. Ich verkünde, dass ich beschlossen habe, ihr Leben zu verschonen, aber von nun an werden sie mir als Sklaven dienen. Die kleinen Käfer schreien, als sie von meinen Soldaten aus der Stadt gezerrt werden, aber ich weiß, dass sie sich bald mit ihrem Schicksal abfinden und meine treuen Diener werden. Bald ist die Stadt verlassen, ebenso wie die meisten Dörfer von [county.GetName]. Es wird eine Weile dauern, bis sich diese Provinz erholt, aber das hat man davon, dass man sich mir widersetzt. Insgesamt wurden [ROOT.Var('slaves_number_increase').GetValue] Menschen als Sklaven genommen."
 giantess_siege.0002.a:0 "Ihr seid jetzt meine Sklaven."
 giantess_siege.0003.t:0 "[county.GetName] verwüstet"
 giantess_siege.0003.desc:0 "Die Bewohner von [barony.GetName] versammeln sich auf dem zentralen Platz, knien vor mir nieder und flehen um Gnade. Ein schelmisches Grinsen erscheint auf meinem Gesicht, und dann beginne ich plötzlich, alles in Sichtweite zu zerstören. Die Häuser zerbröckeln unter meinem Gewicht, wenn ich mich darauf setze und die Menschen, die sich dort verstecken, mit meinem Arsch zerquetsche. Jeder meiner Schritte löst ein kleines Erdbeben aus und zerstört die Straßen, die diese Käfer seit so vielen Jahren bauen. Die Menschen versuchen wegzurennen, aber ich nehme sie ein paar auf einmal in die Hand und werfe sie in meinen Rachen, womit ich sie zu einem langsamen und schmerzhaften Tod verdamme. Nach ein paar Stunden des Amoklaufs verwandelt sich die einst weitläufige Stadt in Ruinen, und ihre Bewohner wurden entweder in meinem Bauch verdaut oder unter dem Gewicht meines riesigen Körpers zerquetscht. Heute haben [ROOT.Var('slaves_number_increase').GetValue] Menschen wegen meines Zorns ihr Leben verloren. Meine Rücksichtslosigkeit wird auf der ganzen Welt bekannt sein!"
 giantess_siege.0003.a:0 "Das kommt davon, sich mir zu widersetzen!"
 giantess_siege.0004.t:0 "Von [giantess.GetFullName] gefangen"
 giantess_siege.0004.desc:0 "Die Garnison von [barony.GetName] ergibt sich und [giantess.GetFullName] betritt die Stadt ungehindert, zerstört dabei ein paar Häuser und die Straße. Die Bürger weinen und flehen um Gnade, und ich kann nichts tun, um diese Riesin davon abzuhalten, zu bekommen, was sie will. Sie verkündet, dass sie beschlossen hat, uns zu verschonen und uns nicht alle zu töten, sondern zu ihren Sklaven zu machen. Ihre Soldaten fangen an, alle aus der Stadt zu schleifen, während Frauen und Kinder weinen. Jemand erkennt mich als Adlige an und so werde ich bald in den Kerker von [giantess.GetFullNamePossessive] geworfen, wo ich mein Schicksal erwarte."
 giantess_siege.0004.a:0 "Es gab nichts, was ich tun konnte..."
 giantess_siege.0005.t:0 "Von [giantess.GetFullName] getötet"
 giantess_siege.0005.desc:0 "Die Garnison von [barony.GetName] ergibt sich und [giantess.GetFullName] betritt die Stadt ungehindert, zerstört dabei ein paar Häuser und die Straße. Die Bürger weinen und flehen um Gnade, und ich kann nichts tun, um diese Riesin davon abzuhalten, zu bekommen, was sie will. Sie grinst schelmisch, bevor sie beginnt, zu randalieren und die Stadt zu zerstören."
 giantess_siege.0005.swallow.desc:0 "Ich versuche wegzurennen, aber [giantess.GetFullName] kommt näher. Sie geht auf alle Viere und fängt an, Leute einzeln zu packen und sie in ihren Mund zu werfen. Ich gerate in Panik und renne so schnell ich kann, aber ich kann nicht entkommen. [giantess.GetFullName] fängt mich und wirft mich zusammen mit anderen Leuten in ihren Mund. Dann schluckt sie und wir landen in ihrem Bauch, wo bereits Dutzende anderer Winzlinge verdaut werden. Der Geruch ist unerträglich und die Schreie der Winzlinge, die von der Magensäure zersetzt werden, sind wirklich furchterregend. Wir schlagen gegen die Wände von [giantess.GetFullNamePossessive] Magen, aber es ist sinnlos. Ein paar Stunden später verklingen die Schreie und es scheint, als hätte die Riesin ihren Amoklauf beendet. Bald bin ich vollständig vom Bauch der Riesin verdaut und werde Fett an ihrem Arsch. Was für eine elende Art, zum Lebensende zu kommen..."
 giantess_siege.0005.ass.desc:0 "Ich renne mit anderen Winzlingen in eine Kirche und hoffe, dass wir dieses Desaster außer ihrer Sichtweite aussitzen können. Leider ist ein paar Minuten später ein furchterregendes Geräusch zu hören, als die Riesin sich unserem Heiligtum nähert. Für einige Momente herrscht völlige Stille. Dann plötzlich beginnt das Dach der Kirche zu knacken und zu brechen, und wir erkennen, dass die Riesin sich darauf gesetzt hat! Ein paar Sekunden später bricht das Dach vollständig zusammen und ein paar Megatonnen Weiblichkeit fallen auf uns herab und zerquetschen uns zu Brei. Wir sind alle zu einem blutigen Fleck auf [giantess.GetFullNamePossessive] Arsch geworden!"
 giantess_siege.0005.shoecrush.desc:0 "Ich versuche wegzurennen, aber es ist sinnlos, [giantess.GetFullNamePossessive] Fuß kommt näher. Bald bedeckt mich ein wachsender Schatten vollständig und ich begreife, dass ihr Fuß auf mich herabsinkt. Ich habe keine Chance zu entkommen und eine Sekunde später wird mein Körper vollständig unter dem Schuh der Riesin zerquetscht."
 giantess_siege.0005.a:0 "Das ist die Hölle auf Erden!"
 giantess_siege.0006.t:0 "Sklaven gefangen"
 giantess_siege.0006.desc:0 "[raider.Var('slaves_number_increase').GetValue] Sklaven während der Plünderung gefangen"
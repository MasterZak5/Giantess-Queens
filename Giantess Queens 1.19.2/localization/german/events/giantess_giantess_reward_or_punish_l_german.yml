l_german:
giantess_reward_or_punish.0001.t:0 "Belohne oder bestrafe [recipient.GetFirstName]"
giantess_reward_or_punish.0001.desc:0 "[recipient.GetFirstName] hat [recipient.MakeScope.Var('tiny_loyaty').GetValue] Treuheits-Punkte. Wenn der Wert groß genug ist, kann der Winzling belohnt werden. Wenn die Treuheit gering genug ist, kann ich den Winzling bestrafen. Was soll ich tun?"
giantess_reward_or_punish.0001.desc.a:0 "Belohne den Winzling"
giantess_reward_or_punish.0001.desc.b:0 "Bestrafe den Winzling"
giantess_reward_or_punish.0001.desc.c:0 "Verlassen"
giantess_reward_or_punish.0002.t:0 "Belohne [recipient.GetFirstName]"
giantess_reward_or_punish.0002.desc:0 "[recipient.GetFirstName] hat mir gut gedient und verdient eine Belohnung. Der Winzling hat [recipient.MakeScope.Var('tiny_loyaty').GetValue] Treuheits-Punkte. Ich kann dem Winzling ein Training in einer Fähigkeit meiner Wahl geben. Dies kostet [FixedPointToInt(EmptyScope.ScriptValue('minor_loyalty_cost')).GetInt] Treuheits-Punkte."
giantess_reward_or_punish.0004.t:0 "Trainiere [recipient.GetFirstName]"
giantess_reward_or_punish.0004.desc:0 "[recipient.GetFirstName] hat [recipient.GetHerHis] Wert als Vasall bewiesen, und so habe ich beschlossen, [recipient.GetHerHim] eine Trainingseinheit zu geben. Dadurch wird [recipient.GetFirstName] mir noch gehorsamer sein und meine Bedürfnisse noch besser befriedigen können. In welchem Körperteil soll ich ein Training durchführen?"
giantess_reward_or_punish.0004.desc.a:0 "Arsch"
giantess_reward_or_punish.0004.desc.b:0 "Mund und Vore"
giantess_reward_or_punish.0004.desc.c:0 "Brüste"
giantess_reward_or_punish.0004.desc.d:0 "Füße"
giantess_reward_or_punish.0004.desc.e:0 "Vagina"
giantess_reward_or_punish.0005.t:0 "[recipient.GetFirstName] verehrt mich"
giantess_reward_or_punish.0005.desc.opening:0 "[recipient.GetFirstName] kommt in meinem Palast an und steht vor mir. Der Winzling hat einen stolzen Gesichtsausdruck, denn dies ist ein Tag der Ehre für [recipient.GetHerHim]. Schließlich hat [recipient.GetSheHe] sich meinen Respekt verdient, indem [recipient.GetSheHe] mir gut gedient hat.\n\nIch verkünde, dass [recipient.GetHerHis] Fähigkeiten noch weiter verbessert werden könnten, und so wird [recipient.GetSheHe] ein Training erhalten, um [recipient.GetHerHim] noch besser darin zu machen, mich zu befriedigen."
giantess_reward_or_punish.0005.desc.ass:0 "Ich gebe [recipient.GetFirstName] ein Training in Fähigkeiten, die [recipient.GetHerHim] helfen werden, meinen Arsch noch besser zu verehren. Die Übungen umfassten das Aushalten meines Gewichts, während ich auf dem Winzling sitze, eine Übung zum Küssen meines Arsches und eine Übung zum Massieren und Reiben meiner Arschbacken. Am Ende ist der Winzling erschöpft, aber das Training war nicht umsonst. [recipient.GetFirstName] kann meinen Arsch jetzt noch besser verehren."
giantess_reward_or_punish.0005.desc.vore:0 "Ich gebe [recipient.GetFirstName] ein Training in Vore- und Mundfertigkeit. Der Winzling musste dem Druck meiner Lippen standhalten, lernen, sich in meinem Mund zu orientieren und ihn bestmöglich zu befriedigen, nicht in die Tiefen meines Bauches zu rutschen und sich darauf einzustellen, mit Speichel und Lippenstift bedeckt zu sein. [recipient.GetFirstName] wird meinen Mund jetzt noch besser befriedigen können."
giantess_reward_or_punish.0005.desc.boobs:0 "[recipient.GetFirstName] erhielt ein Training in Titten-Fertigkeiten, das beinhaltet, den Atem anzuhalten, während man von Brüsten zerquetscht wird, die besten Wege, die Nippel einer Riesin zu befriedigen und die Fähigkeit, meine weichen Brüste zu massieren und zu reiben. Meine Brüste werden nun richtiger befriedigt werden!"
giantess_reward_or_punish.0005.desc.foot:0 "Ich gebe [recipient.GetFirstName] ein Training in Fußfertigkeiten. Der Winzling lernte, wie man den Fuß einer Riesin massiert und wie man sie auf die bestmögliche Weise anbetet und küsst. [recipient.GetFirstName] sollte nun geschickter darin sein, meine Füße zu befriedigen!"
giantess_reward_or_punish.0005.desc.vagina:0 "Ich gebe [recipient.GetFirstName] ein Training in Vaginakenntnissen. Jetzt weiß der Winzling, wie man die Vagina einer Riesin am besten befriedigt. Meine Vagina wird jetzt noch mehr Befriedigung von [recipient.GetFirstName] bekommen!"
giantess_reward_or_punish.0005.desc.a:0 "Guter Winzling!"
giantess_reward_or_punish.0006.t:0 "[actor.GetTitleAsName] belohnt mich"
giantess_reward_or_punish.0006.desc.opening:0 "[actor.GetTitleAsName] befiehlt mir, so schnell wie möglich zu ihrem Palast zu kommen. Zuerst bin ich erschrocken, denn die schlechte Laune meiner Herrin ist im ganzen Reich bekannt, aber als guter Winzling kann ich mich ihrer Forderung nicht widersetzen. Ich reise ab und komme so schnell wie möglich an. Als ich den Palast betrete, weisen mir die Wachen den Weg zu ihrem persönlichen Gemach und zwinkern mir zu. Es scheint, als sei die Riesin heute gut gelaunt, also sollte ich mich wohl ein wenig entspannen, soweit das möglich ist, wenn man bedenkt, dass ich [actor.GetTitleAsName] treffen werde. Als ich [actor.GetTitleAsNamePossessive] Raum betrete, Als ich den Raum [actor.GetTitleAsNamePossessive] betrete, sehe ich sie in der Mitte des Raumes Ihr hoch aufragender Körper ist schön, königlich und stark, wie immer. Sie dreht sich um und kommt sehr schnell auf mich zu, und ihre Schritte lösen fast ein Erdbeben aus, das mich fast zu Boden fallen lässt. Ich schaffe es gerade noch, mich auf den Beinen zu halten, und dann beugt sich die Riesin hinunter, um mich in die Hand zu nehmen und mich direkt vor ihren Mund zu stellen.\n\nSie begrüßt mich laut, ihre Stimme schickt ein Echo in den Raum und macht mich fast taub.\n\n"Ich habe dich gerufen, weil du deiner Herrin gut gedient hast, [recipient.GetFirstName]. Und natürlich wirst du mir bis zu deinem letzten Atemzug dienen, denn du bist klug genug, dich nicht zu den Narren zu gesellen, die unter meinem Körper oder in meinem Bauch umgekommen sind. Aber natürlich dienen mir meine treuen Diener wie du nicht nur aus Angst, sondern auch aus Liebe und Dankbarkeit gegenüber ihrer rechtmäßigen Herrin, denn die Verehrung meines Körpers ist für Sterbliche wie dich ein großes Privileg und der Sinn deines Lebens. Ich zweifle nicht daran, dass du dein Leben gerne aufgeben würdest, nur um mir zu gefallen." Nach diesen Worten falle ich auf die Knie und versichere der Riesin, dass mein ganzes Leben darauf ausgerichtet ist, ihr zu dienen und ihren Willen zu erfüllen. "Guter Winzling, aber du könntest deiner Herrin noch besser dienen. Als Belohnung für deine treuen Dienste werde ich dir ein Training geben. Du wirst deine Fähigkeiten verbessern und lernen, wie du noch besser auf meine Bedürfnisse eingehen kannst. Lass uns gleich damit anfangen."\n\n"
giantess_reward_or_punish.0006.desc.ass:0 "Die Riesin legt mich auf ihr Bett und beginnt, mich in der Kunst der Anbetung ihres Arsches zu unterweisen. Sie setzte sich auf mich, erdrückte mich mit ihrem kolossalen Arsch und ließ mich nicht atmen, aber sie gab mir genug Ruhe, um mich nicht zu überfordern. Während sie auf mir saß, sagte sie, dass ich anfangen müsse, den Schmerz zu lieben, weil mein Schmerz sie erfreue, und sie zu erfreuen sei der ganze Sinn meiner Existenz. [actor.GetTitleAsName] zwang mich, ihren Hintern zu küssen und ihre Arschbacken stundenlang zu reiben, um meine Fähigkeiten zu verbessern und mich fähiger zu machen, sie zu Natürlich hat sie während des Trainings nicht ihre ganze Kraft eingesetzt, denn es gibt keine Möglichkeit, dass ich den vollen Druck ihres massiven Körpers hätte aushalten können. Als der Tag schließlich zu Ende ging, war ich völlig erschöpft und hatte Muskel- und Knochenschmerzen, aber ich habe das Gefühl, heute viel gelernt zu haben, und mein Körper wird noch stärker werden. Ich verbringe die Nacht in [actor.GetTitleAsNamePossessive] Palast und am nächsten Morgen nimmt meine Herrin Abschied von mir. Sie gibt mir Anweisungen über den Stand der Dinge in meinem Herrschaftsgebiet und sagt mir, dass sie mich bald wieder rufen wird, und hoffentlich war das gestrige Training nicht umsonst und ich werde in der Lage sein, mein neues Wissen und meine Belastbarkeit anzuwenden, um sie noch besser als zuvor zu befriedigen."
giantess_reward_or_punish.0006.desc.vore:0 "Die Riesin fängt an, mich zu küssen und an mir zu saugen, meinen Körper mit der Kraft ihrer Lippen zu erdrücken und mich mit ihrem Speichel zu bedecken. Dann befiehlt sie mir, ihren Mund zu betreten und spielt mit ihrer Zunge an mir. Manchmal hatte ich das Gefühl, dass ich fast in die Tiefen ihres Bauches stürzen und verenden würde, aber die Riesin setzte offensichtlich nicht ihre ganze Kraft ein und spielte nur mit mir, um mir die Möglichkeit zu geben, ihren Mund besser kennenzulernen und etwas Übung darin zu bekommen, ihn zu befriedigen. Ich habe gelernt, mich daran zu gewöhnen, dass ich mit Speichel und Lippenstift bedeckt bin, und es schränkt meine Bewegungen nicht mehr so sehr ein wie früher. Als das Training endete, war ich völlig erschöpft, und mein Körper war ganz blass und verschrumpelt von der ganzen Feuchtigkeit, aber ich habe definitiv viel gelernt und die Erfahrung genossen. Ich habe die Nacht im Palast der Riesin verbracht, und am nächsten Morgen verabschiedet sie sich von mir und gibt mir einen kräftigen und süßen Kuss, der mich erfreut. Ich werde bald in ihren Palast zurückkehren und meine Herrin noch besser als bisher befriedigen können."
giantess_reward_or_punish.0006.desc.boobs:0 "Die Riesin legt mich auf ihr Bett, legt sich auf mich und zerquetscht mich mit ihren Brüsten. Ich muss all meine Fähigkeiten einsetzen, um zu überleben, aber die Riesin setzt ihre Kraft offensichtlich nicht voll ein, sonst wäre ich ein Fleck auf ihrer Haut geworden. Sie presste auch ihre Brüste zusammen, um mich zu erdrücken, damit ich der zermalmenden Kraft ihres Busens besser standhalten konnte. Ich übte auch, ihre Nippel zu streicheln und hatte Gelegenheit, ihre weichen, großen Brüste zu reiben und zu massieren. Als das Training zu Ende war, war ich völlig erschöpft, aber es hat sich auf jeden Fall gelohnt, denn meine Fähigkeiten haben sich stark verbessert und ich hatte sogar Spaß dabei. Am nächsten Tag verließ ich den Palast der Riesin in dem Wissen, dass ich bald zurückkehren und meine neu erworbenen Fähigkeiten in der Praxis anwenden kann."
giantess_reward_or_punish.0006.desc.foot:0 "Die Riesin gibt mir eine Ausbildung in der Kunst, ihre Füße zu verwöhnen. Ich musste den Druck ihrer Füße sowohl in Schuhen als auch barfuß aushalten, ihre Füße massieren und sie so intensiv wie möglich küssen. Am Ende bin ich völlig erschöpft, aber ich habe das Training genossen und bin viel belastbarer und geschickter geworden. Am nächsten Tag reise ich nach Hause ab, aber die Riesin wird mich bald wieder rufen, und ich werde all die Fähigkeiten, die ich gestern gelernt habe, in der Praxis anwenden müssen."
giantess_reward_or_punish.0006.desc.foot:0 "Die Riesin trainiert mich, damit ich besser in der Lage bin, ihre Vagina zu befriedigen. Am Ende besitze ich deutlich bessere Kenntnisse, um bereit zu sein, wenn ich meine neuerworbenen Fähigkeiten praktisch anwenden muss."
 giantess_sex.0002.t:0 "[tiny.GetFirstName] kommt an"
 giantess_sex.0002.desc:0 "Als [tiny.GetFirstName] in mein Zimmer kommt, stehe ich nackt da und zeige [tiny.GetHerHim] all meine Vorzüge. [tiny.GetFirstName] ist von der Schönheit, Größe und Kraft meines Körpers beeindruckt. Ich befehle [tiny.GetHerHim], [tiny.GetHerHis] Kleider auszuziehen und setze meinen kleinen Liebhaber auf mein Bett. Ich kann [tiny.GetHerHim] befehlen, alles zu tun, was ich will. Welchem ​​Teil von mir wird [tiny.GetFirstName] die Ehre zuteil, zu befriedigen?\n\n"
 giantess_sex.0002.skilled:0 "[tiny.GetFirstName] ist am geschicktesten mit [tiny.Custom('GiantessPreference')], also sollte ich [tiny.GetHerHim] wahrscheinlich mit meinem entsprechenden Körperteil arbeiten lassen."
 giantess_sex.0002.desc.a:0 "Du wirst meinen Arsch anbeten!"
 giantess_sex.0003.t:0 "[tiny.GetFirstName] weist mich zurück!"
 giantess_sex.0003.desc:0 "[tiny.GetFirstName] hat sich geweigert, zu kommen und mich zu befriedigen. Das ist traurig, aber da kann ich nichts machen."
 giantess_sex.0003.criminal:0 "Der kleine Scheißer [tiny.GetFirstName] hat sich geweigert, zu kommen und mich zu befriedigen! Deiner Herrin nicht zu gehorchen ist Verrat!"
 giantess_sex.0003.desc.a:0 "Wie kann [tiny.GetSheHe] nur..."
 giantess_sex.0004.t:0 "Ende des Sex"
 giantess_sex.4.gentle:0 "Ich sitze auf dem Bett und lege [tiny.GetFirstName] direkt unter meinen Hintern und bitte [tiny.GetHerHim] sanft, mein Arschloch zu lecken und meine Arschbacken zu massieren. Der Winzling macht sich liebevoll an die Arbeit. Ich versuche, nicht zu vergessen, dass der Winzling unter mir ist, und versuche sicherzustellen, dass ich [tiny.GetHerHim] nicht versehentlich unter meinem riesigen Körper zerquetsche.\n\n"
 giantess_sex.4.evil:0 "Ich packe [tiny.GetFirstName] und schiebe [tiny.GetHerHim] heftig unter meinen Arsch, wobei ich [tiny.GetHerHim] mit dem enormen Gewicht meines Körpers festhalte. "Leck mein Arschloch und massiere meine Arschbacken, Wurm, sonst zerquetsche ich dich!" – meine Worte zeigen sofort Wirkung, als der verängstigte Winzling anfängt, seine Arbeit zu tun. Das Wohlergehen dieses Käfers ist mir eigentlich egal, im Gegenteil, je mehr er leidet, desto mehr Freude werde ich empfinden. Wenn dieses Insekt mit der Pracht einer Riesin wie mir nicht zurechtkommt, sollte man es zerquetschen!\n\n"
 giantess_sex.4.desc_dead:0 "Ich spüre nicht mehr, wie [tiny.GetFirstName] mich befriedigt. Ich stehe auf und schaue auf das Bett. Es scheint, als hätte ich [tiny.GetHerHim] versehentlich mit meinem Po zerquetscht..."
 giantess_sex.4.desc_satisfied:0 "[tiny.GetFirstName] ist ein wirklich guter Liebhaber, [tiny.GetSheHe] hat mir so gut befriedigt, dass ich einen Orgasmus bekommen habe!"
 giantess_sex.4.desc_unsatisfied:0 "Ich spüre nicht mehr, wie [tiny.GetFirstName] mir Lust bereitet. Unser Sex ist vorbei, aber ich fühle mich nicht befriedigt. Dieser Winzling hat [tiny.GetHerHis] Aufgabe nicht erfüllt! Was soll ich mit [tiny.GetHerHim] tun?"
 giantess_sex.0004.desc.a.gentle:0 "Es tut mir so leid, ich habe vergessen, dass du so winzig bist!"
 giantess_sex.0004.desc.a.evil:0 "Noch ein Käfer unter meinem Hintern zerquetscht!"
 giantess_sex.0004.desc.b:0 "Ich muss [tiny.GetHerHim] öfter in mein Zimmer einladen..."
 giantess_sex.0004.desc.c:0 "Ich werde [tiny.GetHerHim] gehen lassen, aber ich werde mich daran erinnern."
 giantess_sex.0004.desc.d:0 "Deine Herrin nicht zu befriedigen ist der Tod!"
 giantess_sex.0002.desc.b:0 "Meine Titten könnten eine Massage vertragen!"
 giantess_sex.0005.t:0 "Tittensex"
 giantess_sex.0005.desc.gentle:0 "Ich ziehe [tiny.GetFirstNamePossessive] vorsichtig die Kleider aus und nehme ihn in die Hand. Dann lege ich mich aufs Bett und lege ihn neben meine Brüste. Meine großen, weichen Brüste brauchen etwas Verwöhnung. Ich habe zwei Möglichkeiten – ich könnte den Kleinen auf meine Brüste legen und ihn meine Nippel verwöhnen lassen, während er auf meinen weichen Titten hüpft. Das ist eine sichere Option, aber die Last, mich zu befriedigen liegt ganz bei [tiny.GetHerHim]. Oder ich könnte [tiny.GetHerHim] zwischen meine Brüste legen und [tiny.GetHerHim] gegen sie zu drücken, was uns beide involvieren würde, aber möglicherweise dazu führen könnte, dass der Winzling von meinen riesigen Hügeln erstickt wird. Was soll ich wählen?"
 giantess_sex.0005.desc.evil:0 "Ich reiße [tiny.GetFirstName] die Kleider vom Leib und schnappe ihn mir in die Hand, dann lege ich mich ins Bett und werfe das Insekt auf meinen Bauch. Meine Brüste lechzen nach etwas Erregung, aber kann ich diesem erbärmlichen Insekt wirklich vertrauen, dass es die Arbeit erledigt? Wenn ich [tiny.GetFirstName] meine Nippel befriedigen lasse, während ich mich entspanne und Lust genieße, ist das Insekt sicher, aber ich könnte [tiny.GetHerHim] auch mit meinen Brüsten drücken, was mir sicherlich Freude bereiten wird, auch wenn das Insekt in Gefahr sein könnte. Ich werde versuchen, seinen winzigen Körper nicht zu sehr zu belasten, aber meine riesigen Brüste könnten zu viel für ihn sein. Aber ist es mir wirklich wichtig, ob dieser Kleine überlebt, wenn ich am Ende befriedigt werde?"
 giantess_sex.0005.desc.a:0 Lass den Kleinen auf meinen Brüsten reiten und an meinen Nippeln saugen
 giantess_sex.0005.desc.a.success:0 "Der Winzling ist erfolgreich und du bist zufrieden."
 giantess_sex.0005.desc.a.fail:0 "Der Winzling scheitert und du wirst nicht genug befriedigt."
 giantess_sex.0005.desc.a:0 "Ich werde [tiny.GetHerHim] mit meiner Liebe erdrücken, was soll schon schiefgehen!"
 giantess_sex.0005.desc.b.success:0 "Du bist befriedigt und der Winzling überlebt."
 giantess_sex.0005.desc.b.fail:0 "Du bist befriedigt, aber der Winzigling wird von deiner riesigen Brust erstickt"
 giantess_sex.0006.t:0 "Sex Ausgang"
 giantess_sex.0006.desc.nipple_success:0 "Ich befehle dem Winzling, meine Nippel zu befriedigen, und [tiny.GetSheHe] beginnt sofort damit. Ich stöhne vor Lust, und jedes meiner Stöhnen lässt das Winzige auf den weichen, kissenartigen Brüsten hüpfen. Nach einer halben Stunde leidenschaftlicher Erregung ist der Winzling erschöpft, aber ich hatte einen Orgasmus und bin zufrieden. Der Winzling hat [tiny.GetHerHis] Aufgabe erfüllt! Vielleicht sollte ich ein Auge auf [tiny.GetHerHim] haben, meine Brüste und andere Körperteile könnten in Zukunft etwas mehr Hilfe gebrauchen..."
 giantess_sex.0006.desc.nipple_fail:0 "Ich befehle dem Winzling, meine Nippel zu befriedigen, und [tiny.GetSheHe] beginnt sofort damit. Ich stöhne vor Lust, und jedes meiner Stöhnen lässt das Winzige auf den weichen, kissenartigen Brüsten hüpfen. Nach einer halben Stunde leidenschaftlicher Erregung ist der Winzling erschöpft, aber ich bin nicht zufrieden. Dieser Winzling ist nicht geschickt genug, um eine Riesin wie mich zu befriedigen! Ich werde [tiny.GetHerHim] vorerst damit davonkommen lassen, aber wenn er in Zukunft so schlecht abschneidet, werde ich gezwungen sein, [tiny.GetHerHim] zu bestrafen!"
 giantess_sex.0006.desc.squish_success:0 "Ich werfe den Winzling in mein Dekolleté und fange an, [tiny.GetHerHim] gegen meine weichen, großen, kissenartigen Brüste zu drücken. Ich empfinde viel Lust, obwohl ich spüre, dass der Winzling nach Luft schnappt. Nach ein paar Minuten solch intensiver Aktion bekomme ich einen Orgasmus und drücke meine Brüste weg. Der Winzling ist zwar erschöpft, aber immer noch am Leben! Ich kann nicht anders, als [tiny.GetFirstNamePossessive] Widerstandskraft zu bewundern, schließlich sind meine Brüste für so einen winzigen Körper eine Menge. Ich sollte ein Auge auf [tiny.GetFirstName] haben, dieser Winzling kann den Druck meines Körpers definitiv aushalten."
 giantess_sex.0006.desc.squish_fail:0 "Ich werfe den Winzling in mein Dekolleté und fange an, [tiny.GetHerHim] gegen meine weichen, großen, kissenartigen Brüste zu drücken. Ich empfinde viel Lust, obwohl ich spüre, dass der Winzling nach Luft schnappt. Nach ein paar Minuten solch intensiver Aktion bekomme ich einen Orgasmus und drücke meine Brüste weg. Der Winzling ist ganz blass und zerknittert, [tiny.GetSheHe] ist eindeutig tot. Waren meine Brüste zu viel für [tiny.GetHerHim]?"
 giantess_sex.0006.desc.a.success:0 "Wir sehen uns wieder!"
 giantess_sex.0006.desc.a.fail:0 "Daran werde ich mich sicher erinnern."
 giantess_sex.0006.desc.a.death.gentle:0 "Aber ich wollte nur meine Liebe zeigen..."
 giantess_sex.0006.desc.a.death.evil:0 "Was ist los, Wurm, kannst du nicht mit einem Busen umgehen?"
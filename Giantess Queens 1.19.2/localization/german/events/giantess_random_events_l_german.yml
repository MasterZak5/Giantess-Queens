l_german:

 giantess_random.0001.t:0 "[tiny.GetFirstName] unter meinem Arsch zerdrückt!"
 giantess_random.0001.desc:0 "Ich machte einen Spaziergang durch meinen Palast und beschloss, mich ein wenig auszuruhen. Ich setze mich achtlos auf eine Bank in der Nähe und höre einen lautes Knacken. Als ich aufstehe, sehe ich eine Lache aus Blut, Knochen und Fleisch, die einmal [tiny.GetFirstName] war. [tiny.GetSheHe] hatte keine Chance, unter meinem Arsch zu überleben!"
 giantess_random.0001.desc.a:0 "Es tut mir so leid, ich habe nicht gesehen, dass du da warst!"
 giantess_random.0001.desc.b:0 "Dummer Käfer, ich muss mich sofort umziehen!"
 giantess_random.0002.t:0 "[tiny.GetFirstName] unter meinem Schuh zerdrückt!"
 giantess_random.0002.desc:0 "Ich machte einen Spaziergang durch meinen Palast, als ich ein lautes Knackgeräusch hörte. Als ich meinen Fuß anhebe, sehe ich eine Lache aus Blut, Knochen und Fleisch, die einmal [tiny.GetFirstName] war. [tiny.GetSheHe] hatte keine Chance, unter meinem Schuh zu überleben!"
 giantess_random.0002.desc.b:0 "Blöder Käfer! Bringt mir sofort ein anderes Paar Schuhe!"
 giantess_craving.0001.t:0 "Plötzliches Verlangen"
 giantess_craving.0001.desc:0 "Als ich durch meinen Palast gehe, verspüre ich plötzlich den Drang, mich zu befriedigen. Mein Blick fällt auf [vassal.GetFirstName], und [vassal.GetSheHe] ist so klein und schwach, dass [vassal.GetSheHe] nicht widerstehen kann. Aber soll ich es wirklich tun?"
 giantess_craving.0001.desc.a:0 "Ich muss meinen Impulsen widerstehen."
 giantess_craving.0001.desc.b:0 "Ich möchte mich unbedingt auf [vassal.GetHerHim] setzen."
 giantess_craving.0001.desc.c:0 "Ich möchte [vassal.GetHerHim] unbedingt mit meinem Fuß zerdrücken."
 giantess_craving.0001.desc.d:0 "Ich bin so hungrig, ich werde [vassal.GetHerHim] essen!"
 giantess_craving.0001.desc.e:0 "Ich werde[vassal.GetHerHim] mit meinen Brüsten erdrücken!"
 giantess_craving.0001.desc.f:0 "Ich werde [vassal.GetHerHim] küssen!"
 giantess_craving.0001.desc.g:0 "Ich werde dafür sorgen, dass [vassal.GetHerHim] mich anbetet und [vassal.GetHerHim] mit meiner Hand zerquetschen!"
 giantess_craving.0002.t:0 "Isst [vassal.GetFirstName]"
 giantess_craving.0002.desc:0 "Ich packe [vassal.GetFirstName] schnell und hebe [vassal.GetHerHim] zu meinem Der Winzling ist verwirrt und verängstigt, [vassal.GetSheHe] bettelt um Gnade! Aber mein Bauch knurrt so laut und ich bin so hungrig! Ich werfe den Winzling in den Mund, sauge ein wenig an [vassal.GetHerHim], schmecke [vassal.GetHerHis] Geruch, dann schlucke ich und schicke meinen Vasallen in die Tiefen meines Magens. Mein Hunger ist endlich gestillt."
 giantess_craving.0002.desc.a:0 "Es ist nicht meine Schuld, dass ich hungrig war!"
 giantess_craving.0003.t:0 "Von [giantess.GetFirstName] gegessen"
 giantess_craving.0003.desc:0 "Ich schlenderte gerade durch [giantess.GetUINamePossessive] Palast, als sie plötzlich unruhig wird. Sie packt mich in ihrer Hand und wirft mich in ihren Mund, was mich völlig verwirrt und überrascht. Ich flehe sie an, mich freizulassen, aber die Riesin ist unbarmherzig. Schon bald rutsche ich in die Tiefen ihres Magens hinab und werde zu einer Zwischenmahlzeit für meine unersättliche Herrin."
 giantess_craving.0003.desc.a:0 "Ich hätte nicht herkommen sollen..."
 giantess_random.0003.t:0 "Fruchtbarkeitsfenster"
 giantess_random.0003.desc:0 "Ich spüre, wie sich das Leben in meinem Schoß ausbreitet. Ich spüre, dass ich fruchtbar werde und dass es möglich ist, ein Kind zu bekommen. Ich sollte so schnell wie möglich meinen Mann herbeirufen, damit er mich schwängert! Eine Riesin zu schwängern ist allerdings ein schwieriges Unterfangen, so dass unsere Vagina-Fähigkeiten die Erfolgsaussichten beeinflussen werden."
 giantess_random.0003.desc.a:0 "Ruft ihn sofort herbei!"
 giantess_random.0003.desc.b:0 "Ich will kein weiteres Kind"
 giantess_random.0004.t:0 "Ergebnis"
 giantess_random.0004.desc.success:0 "Ich lege mich mit [tiny.GetFirstName] hin und schiebe ihn in meine Vagina. Der Winzling arbeitet hart, um mich zu beglücken, und schafft es schließlich, mich zu befriedigen. Als ich zum Orgasmus komme, dringt auch der Samen des Winzlings in meine Gebärmutter ein, und unsere Liebe führt dazu, dass ich schwanger werde."
 giantess_random.0004.desc.fail:0 ""Ich lege mich mit [tiny.GetFirstName] hin und schiebe ihn in meine Vagina. Der Winzling arbeitet hart, um mich zu beglücken, aber eine Riesin zu befriedigen, ist für einen mickrigen Winzling eine zu schwere Aufgabe. Die Magie hat nicht stattgefunden, und die Chance auf eine Schwangerschaft ist umsonst gewesen."
 giantess_random.0004.desc.a:0 "Neues Leben wächst in mir heran..."
 giantess_random.0004.desc.b:0 "Ich bin traurig..."
 giantess_random.0005.t:0 "[giantess.GetFullName] ist fruchtbar"
 giantess_random.0005.desc.success:0 "Meine riesige Ehefrau, [giantess.GetFirstName], ruft mich zu sich. Sie sagt mir, dass sie das Gefühl hat, fruchtbar zu sein, und dass dies eine perfekte Gelegenheit für mich ist, sie zu schwängern. Sie führt mich in ihre Vagina ein und ich bemühe mich, sie zu befriedigen. Ich gebe ihr einen guten Stoß, und bald kommt sie zum Orgasmus. Ich schicke meinen Samen in ihre Gebärmutter, und so beginnt ein neues Leben in ihrem Körper zu entstehen."
 giantess_random.0005.desc.fail:0 "Meine riesige Ehefrau, [giantess.GetFirstName], ruft mich zu sich. Sie sagt mir, dass sie das Gefühl hat, fruchtbar zu sein, und dass dies eine perfekte Gelegenheit für mich ist, sie zu schwängern. Sie führt mich in ihre Vagina ein und ich bemühe mich, sie zu befriedigen. Leider waren meine Bemühungen unzureichend, und so blieb der Zauber aus. [giantess.GetFirstName] ist sichtlich traurig."
 giantess_random.0005.desc.a.success:0 "Ich werde ein Vater sein!"
 giantess_random.0005.desc.a.fail:0 "I failed her..."
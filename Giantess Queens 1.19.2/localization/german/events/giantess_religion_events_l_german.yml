l_german:

 giantess_religion.0001.t:0 "Der Händler trifft ein"
 giantess_religion.0001.desc:0 "Der Händler kam in meinen Palast und begann mir von der Karte zu erzählen: "Ich präsentiere Euch die Karte, die den Standort eines alten Tempels anzeigt, der große Geheimnisse und immense Macht birgt! Leider ist sie in einer alten Sprache geschrieben, die ich nicht verstehe. Ich habe diese Karte von einem anderen Händler gekauft und sie hat mich ein Vermögen gekostet! Ich erwarte, dass ich durch den Verkauf an Euch ein paar Münzen erhalte!" Höchstwahrscheinlich hält mich dieser Mann zum Narren, aber irgendwie habe ich das Gefühl, dass es nicht so einfach ist. Aber soll ich mein ehrlich verdientes Gold nur für diese Karte hergeben, die ich nicht einmal lesen kann?"
 giantess_religion.0001.desc.a:0 "Soll er doch seine Münzen haben, aber wehe, wenn er mich auf den Arm nimmt!"
 giantess_religion.0001.a.tt:0 "Du erhälst die Karte. Jetzt musst du sie entziffern."
 giantess_religion.0001.desc.b:0 "Hältst du mich wirklich für so dumm? Wachen, schafft diesen Betrüger aus meinem Schloss!"
 giantess_religion.0002.t:0 "Entschlüsselung der Karte"
 giantess_religion.0002.desc:0 "Ich kann auf der Karte einige bekannte Formen erkennen, aber die genaue Lage dieses Tempels entzieht sich mir. Mit genügend Mühe könnte es aber möglich sein, dieses Rätsel zu lösen."
 giantess_religion.0002.desc.a:0 "Ich werde einen Teil meiner Freizeit damit verbringen, sie zu entziffern."
 giantess_religion.0002.desc.b:0 "Ich werde meine ganze Aufmerksamkeit auf diese Aufgabe richten!"
 giantess_religion.0002.a.success.tt:0 "Erfolg"
 giantess_religion.0002.a.success:0 "Ich habe die Karte erfolgreich entziffert."
 giantess_religion.0002.a.falure.tt:0 "Versagt"
 giantess_religion.0002.a.falure:0 "Ich kann die Karte nicht entziffern."
 giantess_religion.0003.t:0 "Erfolg!"
 giantess_religion.0003.desc:0 "Deine Bemühungen haben sich gelohnt! Du hast die Karte erfolgreich entschlüsselt und kennst nun den Standort des Tempels. Du weißt nicht, was dich erwartet, also solltest du dich vorbereiten, bevor du dich auf den Weg machst (empfohlenes Kampfgeschick 15 oder mehr)."
 giantess_religion.0003.desc.a:0 "Gut!"
 giantess_religion.0004.t:0 "Versagt!"
 giantess_religion.0004.desc:0 "Du hast dich sehr bemüht, die Karte zu entziffern, aber es hat nicht geklappt. Vielleicht solltest du es in ein paar Jahren noch einmal versuchen und in der Zwischenzeit ein paar Bücher lesen (versuche, deine Bildung zu erhöhen, bevor du es noch einmal versuchst)."
 giantess_religion.0004.desc.a:0 "Na ja, nächstes Mal mehr Glück."
 giantess_religion.0005.t:0 "Ankunft im Tempel"
 giantess_religion.0005.desc:0 "Nach ein paar Tagen Reise bin ich endlich am Ziel angekommen. Ich sehe einen kleinen Eingang zur Höhle und beschließe, sie zu erkunden. Überraschenderweise wird die Höhle bald breiter und extrem riesig. Es ist mir unangenehm, so tief zu erkunden, doch ich fahre fort. Zum Glück scheint der Weg ziemlich klar zu sein, und es fühlt sich tatsächlich eher wie eine Straße an.\n\nDie Höhle ist zu groß und ich muss eine Nacht verbringen, um meine Kräfte wiederzugewinnen. Nach ein paar Stunden zu Fuß ändert sich die Umgebung allmählich.  Sie erscheint immer künstlicher, bis ich schließlich eine riesige Statue sehe. Könnte dies wirklich ein Ort sein, der Geheimnisse der Vergangenheit birgt? Ich gehe weiter und erreiche schließlich etwas, das wie ein Tempel aussieht.\n\nDie Größe dieses Schreins ist wirklich beeindruckend. Ich bin von riesigen Statuen umgeben, aber aus irgendeinem Grund scheinen sie alle weiblich zu sein. Könnte dies ein Schrein für eine alte heidnische Göttin sein? Vielleicht finde ich die Antworten tiefer in diesem Tempel.\n\nPlötzlich erregt ein lauter Knall meine Aufmerksamkeit. Zwei Sekunden später noch einer. Das Geräusch wird lauter, jetzt klingt es mehr wie Donner, und der Boden beginnt zu beben. Noch ein ohrenbetäubendes Rasseln, und ich wandle auf dem Boden, unfähig, das Gleichgewicht zu halten. Als ich mich umdrehe, sehe ich endlich die Quelle dieses Geräuschs, und ich traue meinen Augen nicht! Eine enorme Frau kommt schnell auf mich zu. Sie ist völlig nackt, und ich kann nicht anders, als die Größe und Schönheit ihres Körpers zu bewundern, denn so etwas habe ich noch nie gesehen! Ich fange an zu rennen, aber mein Tempo ist dem der gigantischen Fremden nicht gewachsen, und bald bin ich wieder auf den Knien, und ein riesiger Schatten verdeckt das Licht der Sonne, das durch die Löcher in der Höhlendecke scheint.\n\n"Soso, was haben wir denn hier?", sagt die Riesin. "Ich bin beeindruckt, dass du es so weit geschafft hast, aber ich fürchte, deine Reise endet hier." Die Riesin hebt ihren Fuß und beginnt, ihn schnell auf mich zu senken! Ich muss rennen, bevor sie mich mit ihrem riesigen Fuß zerquetscht!"
 giantess_religion.0005.desc.a:0 "Lauf, ich werde den Druck ihres Fußes nicht überstehen!"
 giantess_religion.0005.desc.a.success.tt:0 "Erfolg"
 giantess_religion.0005.desc.a.success:0 "Du kannst ihrem Fuß erfolgreich ausweichen."
 giantess_religion.0005.desc.a.fail.tt:0 "Versagt"
 giantess_religion.0005.desc.a.fail:0 "Du wirst unter ihrem riesigen Fuß zerquetscht!"
 giantess_religion.0006.t:0 "Unter Fuß zerdrückt!"
 giantess_religion.0006.desc:0 "Ich versuche zu rennen, aber ich bin einfach nicht schnell genug. Die Riesin senkt ihren Fuß und drückt mich nieder. Sie kichert und sagt mir, wie wertlos ich bin. Sie erhöht langsam den Druck und bald spüre ich, wie meine Knochen brechen. Der Schmerz ist zu viel für mich und mein Leben beginnt, mich zu verlassen. Bald verliere ich das Bewusstsein und werde zu einem Fleck auf der Sohle der Riesin."
 giantess_religion.0006.desc.a:0 "Ich hätte zuhause bleiben sollen..."
 giantess_religion.0007.t:0 "Dem Fuß der Riesin entkommen"
 giantess_religion.0007.desc:0 "Mein Training und meine körperliche Beweglichkeit haben sich ausgezahlt und ich renne so schnell ich kann los. Das donnernde Aufprallen des Fußes der Riesin auf den Tempelboden betäubt mich und schleudert mich ein paar Meter vom Epizentrum des Aufpralls weg. "Du bist zäher, als ich dachte", sagt die Riesin und als ich den Blick hebe, kann ich das Grinsen auf dem Gesicht der Frau sehen. Wir beide verstehen, dass ich diesen Kampf nicht gewinnen kann, ich bin gegen diesen Koloss einer Frau einfach machtlos. Sie setzt sich schnell auf den Boden und das Klatschen ihrer Pobacken, als sie auf der Oberfläche des Tempels landen, fühlt sich wie ein Donnerschlag an.  Die massive Kreatur streckt ihre Hand aus und packt mich. Ich kann ihrer Kraft nicht widerstehen, da mein ganzer Körper gerade einmal so groß ist wie ihr Mittelfinger. Bald öffnet sie ihre Handfläche und ich sehe ihren Mund direkt vor mir!\n\n"Hör zu, Käfer, ich bin wirklich hungrig, aber ich habe auch seit Jahren kein Vergnügen mehr bekommen. Käfer wie du kamen schon hierher und keiner konnte mich richtig befriedigen. Ich gebe dir eine Chance, mir zu zeigen, was für ein Ritter du bist. Ich liebe es wirklich, wenn Winzlinge in meinem Mund zappeln. Wenn du gut genug zappelst, werde ich dich vielleicht belohnen, obwohl ich bezweifle, dass du irgendetwas ausrichten kannst. Wenn du versagst, wirst du zu meiner Mahlzeit. Ein Teil meines Körpers zu werden, ist ein Privileg, um das du betteln solltest!" Danach steckt sie mich schnell in ihren Mund und beginnt mich in ihren Rachen zu drücken. Ich muss etwas tun, um nicht lebendig verspeist zu werden!"
 giantess_religion.0007.a:0 "Nutze deine körperliche Kraft, um ihr zu widerstehen"
 giantess_religion.0007.desc.a:0 "Du bemühst dich, sie zufriedenzustellen. Arrogante Riesinnen mögen Widerstand eher nicht."
 giantess_religion.0007.desc.a.success.tt:0 "Erfolg"
 giantess_religion.0007.desc.a.success:0 "Du befriedigst die Riesin erfolgreich"
 giantess_religion.0007.desc.a.fail.tt:0 "Versagt"
 giantess_religion.0007.desc.a.fail:0 "Du schaffst es nicht, die Riesin richtig zu befriedigen"
 giantess_religion.0007.b:0 "Biete verehrerische Worte an, um die Riesin zufriedenzustellen"
 giantess_religion.0007.desc.b:0 "Du nutzt deine diplomatischen Fähigkeiten, um die Riesin zufriedenzustellen. Arrogante Riesinnen werden das mögen, aber auf sadistische und gefühllose Riesinnen wird es weniger Wirkung haben."
 giantess_religion.0008.t:0 "Von der Riesin verschluckt!"
 giantess_religion.0008.desc_struggle:0 "Ich kämpfe hart, um der Zunge der Riesin zu widerstehen und nicht in ihren Bauch zu fallen. Ich hoffe, dass meine körperliche Kraft ausreicht, um lange genug durchzuhalten, bis die Riesin mich freilässt."
 giantess_religion.0008.desc_worship:0 "Ich konzentriere mich darauf, der Riesin ein paar ehrfürchtige Worte zu sagen, in der Hoffnung, dass ihr das gefällt und sie mich gehen lässt."
 giantess_religion.0008.desc:1 "\n\nLeider ist die Riesin mit meinen Bemühungen nicht zufrieden und bald falle ich in den tiefen Abgrund ihres Bauches. Hier ist es sehr dunkel und die Geräusche ihres Herzschlags und ihrer Darmbewegungen überwältigen mich. Ihre Magenwände sind glitschig und die Säure verbrennt meine Haut. Ich kann kaum hören, wie die Riesin sagt, dass ich nicht hart genug gekämpft habe und es deshalb mein Schicksal sei, ihr Essen zu werden. Bald werden der Schmerz und die rumpelnden Geräusche unerträglich und ich verliere das Bewusstsein. Ich werde nie wieder aufwachen und mein Körper wird von der Riesin verdaut werden, genau wie der von Dutzenden anderer Narren, die es gewagt haben, sich hierher vorzuwagen."
 giantess_religion.0008.desc.a:0 "Ewiger Schlaf..."
 giantess_religion.0009.t:0 "Riesin zufriedengestellt"
 giantess_religion.0009.desc:1 "\n\nDie Riesin scheint mit meinen Bemühungen zufrieden zu sein, denn sie nimmt mich bald aus ihrem Mund und setzt mich auf ihre Schulter. Ich sehe mich um und sehe ein paar andere Riesinnen um mich herum versammelt. Was ist das für ein Ort und wie versorgen sich diese Riesinnen?\n\n"Du hast mich überrascht, Winzling. Ich nehme an, du hast viele Fragen und ich werde dein Interesse stillen. Lass uns zum Altar gehen, halte dich gut fest!" Während ich mich an die mächtige Schulter der Riesin klammere, erzählt sie mir vom Ursprung der Erde und ihrer Geschichte. Es stellt sich heraus, dass die Götter, an die wir Sterblichen glauben, falsch sind! Die Erde wurde von einer Göttin namens Allmutter erschaffen und sie schuf diese, damit das Volk der Riesinnen weiterleben kann. Die ursprünglichen Riesinnen waren unsterblich und rein, sie behandelten die Natur mit Liebe und Sorgfalt. Die Riesinnen wurden jedoch bald selbstgefällig, faul und gelangweilt, weil sie in ihrem endlosen Leben keine Herausforderungen erlebten. Die Allmutter beschloss, das Leben spannender zu gestalten, indem sie die Winzlinge schuf, zu der wir Menschen gehören. Das Volk der Winzlinge war sterblich und hatte Fehler. Sie waren oft gierig, gefühllos, lüstern und grausam, anders als ihre reinrassigen Gegenstücke, die Riesinnen.\n\nRiesinnen und Winzlinge lebten in Frieden, bis sich eine Riesin in den männlichen Winzling-Häuptling verliebte, der sie zur Kopulation verleitete. Der Samen des Häuptlings gelangte in die Gebärmutter der Riesin und sie gebar Zwillinge, von denen das Mädchen eine Riesin wie ihre Mutter und der Junge ein Winzling wie sein Vater war. Als die anderen Riesinnen davon erfuhren, wurden sie neugierig und begannen sich ebenfalls in die Winzlinge zu verlieben, sowohl in die Männchen als auch in die Weibchen, und die Winzlinge nutzten ihre Naivität aus. Indem sie jedoch diese Sünde begingen und gegen den Plan der Allmutter verstießen, vermischten die Riesinnen ihr Blut mit dem fehlerhaften Winzling-Blut. Die aus solchen Verbindungen geborenen Riesinnen waren sterblich und hatten Fehler, genau wie die Winzlinge. Viele dieser Riesinnen waren grausam und lüstern, genau wie ihre Väter, und sie nutzten ihre Größe, um Winzlinge zu quälen und sie zu zwingen, ihnen sexuell Freude zu bereiten. Die unreinen Riesinnen waren den erstgeborenen Riesinnen bald zahlenmäßig überlegen und töteten sie aus Neid an ihrer Unsterblichkeit. Die Erde versank im Chaos, als die Riesinnen begannen, sich gegenseitig und die Winzlinge zu vernichten, doch nach einigen Jahrhunderten des Kampfes verschwanden die Riesinnen aus unbekannten Gründen. Winzlinge wurden zur dominanten Rasse auf der Erde und einige von ihnen tragen noch immer die Gene ihrer unsterblichen Vorfahren in sich. Es stellte sich heraus, dass die wenigen verbliebenen Riesinnen von den Winzling-Armeen in diesen Tempel verbannt und der Hauptausgang versiegelt wurde. Die Riesinnen überleben und vermehren sich dank der einheimischen Winzlinge, die den Tempel durch die Höhle betreten, um nach verborgenen Schätzen zu suchen. Obwohl niemand zurückkommt, gibt es stets viele Narren!\n\n""Dies ist der Altar. Warte, warum leuchtet er? Könnte es sein..." Die Riesin stellt mich auf den Altar und plötzlich strömt Energie aus ihm heraus. Ich höre ein lautes Geräusch, drehe meinen Kopf und sehe, wie sich eine große Tür öffnet. Auf der anderen Seite scheint die Sonne.\n\n"Unmöglich! Du bist der Verheißene!" Die Riesin erzählt mir, dass es eine Prophezeiung gibt, dass ein Winzling, der viel Riesinnenblut in sich trägt, eines Tages die Tür zum Tempel öffnen wird. Die Riesinnen werden dann herauskommen, ihre Position wiederherstellen und erneut Unsterblichkeit erlangen."
 giantess_religion.0009.desc_female:1 "\n\nAber das ist nicht alles! Da ich weiblich bin und so viel Riesenblut in mir trage, können die Riesinnen mir ihre Gabe schenken und mich zu einer Riesin wie ihnen machen! Ich werde sie dann wieder zum Wohlstand führen. "Aber wenn du nicht unsere Anführerin sein willst, muss ich deinen Platz einnehmen. Die Prophezeiung entfaltet sich vor unseren Augen und jemand muss uns in das neue goldene Zeitalter führen. Ich werde dein Reich in Besitz nehmen und du wirst meine treue Vasallin an meiner Seite sein. Die Wahl liegt bei dir, aber jetzt gibt es keinen Weg zurück. Die Tür ist offen und wir werden nicht länger hier bleiben.""
 giantess_religion.0009.desc_male:1 "\n\n"Die Prophezeiung entfaltet sich vor unseren Augen und wir müssen sie erfüllen. Die Tür ist offen und es gibt für keinen von uns einen Weg zurück. Ich werde dein Reich in Besitz nehmen und du wirst mein treuer Vasall an meiner Seite sein. Aus Dankbarkeit für deinen Beitrag werde ich dich zu meinem Mann nehmen und unsere Kinder werden den Namen deines Hauses tragen. Ich fürchte, du darfst dieses Angebot nicht ablehnen.""
 giantess_religion.0009.desc.a:0 "Ich werde eine Riesin und euch anführen!"
 giantess_religion.0009.desc.b:0 "Ich werde dir als meiner Riesin Treue schwören!"
 giantess_religion.00010.t:0 "Die Rückkehr der Riesinnen"
 giantess_religion.00010.desc:0 "Die Riesin liest einen Zauberspruch und ich fühle mich sofort seltsam. Ich fühle, wie magische Energie in mir brodelt und plötzlich entweicht der Boden. Ich wachse! In einer Minute bin ich so groß wie die anderen Riesinnen. Jetzt bin ich eine von ihnen.\n\nIch verlasse den Tempel, die anderen Riesinnen begleiten mich. Eine von ihnen trägt eine winzige Truhe, aber die Menge an Gold darin ist aus sterblicher Sicht riesig. Zusammen mit meinen Gefährtinnen gehe ich in Richtung Reichssitz und brauche nur eine Stunde, um die Entfernung zurückzulegen, für die ich zuvor ein paar Tage brauchte. Ich komme im Reichssitz an und die Einheimischen sind erstaunt und verängstigt. Ich rezitiere die Weltgeschichte, die mir die Riesin im Tempel erzählt hat. Die Leute fallen auf die Knie und schwören mir Treue. In wenigen Tagen verbreitet sich die Nachricht im ganzen Land und darüber hinaus und bald versammelt sich eine Armee von Verehrern außerhalb der Mauern der Hauptstadt. Viel Arbeit erwartet mich. Für mich und meine Gefährten muss ein neues, viel größeres Schloss gebaut werden. Einige meiner Vasallen haben die neue Lage akzeptiert, andere sind schockiert und bereiten einen Aufstand vor. Die Herrscher der Nachbarländer sammeln bereits ihre Truppen gegen mich. Das Schicksal der Menschheit und der Riesinnenvölker liegt in meinen Händen. Werden die Riesinnen diesen Planeten wie in alten Zeiten regieren oder werden sie erneut aussterben?"
 giantess_religion.00010.desc.a:0 "Zeit, zu erobern!"
 giantess_event_troops:0 "Riesinnenverehrer-Armee"
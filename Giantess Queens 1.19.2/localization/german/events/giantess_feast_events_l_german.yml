l_german:

 activity_giantess_feast:0 "Riesinnen-Festmahl"
 activity_giantess_feast_name:0 "[ACTIVITY.GetOwner.GetNamePossessiveOrMy|U] Riesinnen-Festmahl"
 activity_giantess_feast_desc:0 "Jede einflussreiche Riesin im Reich wurde zu einem großen Festmahl eingeladen, um gemeinsam Winzlinge zu essen."
 activity_giantess_feast_owner:0 "Gastgeberin"

 giantess_feast.0006.message.t:1 "[giantess.GetFirstName] isst [tiny.GetFirstName]"
 giantess_feast.0006.message.desc:1 "[giantess.GetFirstName] hat [tiny.GetFirstName] während des Festmahls gegessen."
 giantess_feast.0001.desc:0 "Als meine Mit-Riesin lade ich dich zu einem Festmahl nur für Riesinnen ein. Ich teile gerne die Winzlinge, die ich als Essen habe."
 giantess_feast.0001.a:0 "Ein Fest, juhu!"
 giantess_feast.0001.b:0 "Mir ist nicht danach..."
 giantess_feast.0002.t:0 "Keiner kam zu meinem Fest"
 giantess_feast.0002.desc:0 "Leider kam keine Riesin zu meinem Fest."
 giantess_feast.0002.a:0 "Närrinnen, mehr Essen für mich!"
 giantess_feast.0004.t:0 "Das Fest beginnt!"
 giantess_feast.0004.desc:0 Alle Riesinnen haben sich in [host.GetNamePossessiveOrMy|U] Heimat versammelt und sind bereit, mit dem Festmahl zu beginnen. Hunderte von winzigen Dienern tragen Teller mit Essen, darunter auch ein paar leckere Winzlinge. Heute werde ich etwas Leckeres essen und die Gelegenheit haben, mit meinen großen Freundinnen zu plaudern!"
 giantess_feast.0004.a:0 "Ich kann es kaum erwarten, sie zu probieren!"
 giantess_feast.0005.t:0 "Isst [tiny.GetFirstName]"
 giantess_feast.0005.desc:0 "Der Teller liegt vor mir und [tiny.GetFirstName] liegt darauf. [tiny.GetSheHe] ist mit Kräutern und Salz gewürzt. Der Winzling ist verschreckt und sieht mich ängstlich an. Ich greife [tiny.GetHerHim] und stecke [tiny.GetHerHim] in meinen Mund, der Geschmack ist so lecker! Dann verschlucke ich [tiny.GetFirstName] und spüre, wie [tiny.GetSheHe] sich in meinem Körper bewegt. [tiny.GetFirstName] wird in meinem Bauch verdaut und zu meinen Kurven beitragen!"
 giantess_feast.0005.a:0 "So lecker!"
 giantess_feast.0006.t:0 "Beim Festmahl verspeist!"
 giantess_feast.0006.desc:0 "Die Wachen wecken mich und holen mich aus meiner Zelle. Ich verstehe nicht, was vor sich geht. Dann ziehen sie mir die Kleider aus, legen mich auf einen riesigen Teller und würzen mich mit verschiedenen Kräutern und Salz. Was passiert, das kann nicht möglich sein! Ein Dutzend Winzlinge heben den Teller hoch und tragen ihn scheinbar in ein Esszimmer, denn ich sehe viele Riesinnen, die sich unterhalten und lachen. Sie klettern über eine Leiter auf den Tisch und stellen mich vor [giantess.GetFirstName]. Sie lächelt und schmatzt mit den Lippen, und ich fühle mich wie ein Käfer in diesem Raum voller Riesinnen. [giantess.GetFirstName] packt mich und steckt mich in ihren Mund, ich bin nicht in der Lage, der Kraft dieser gigantischen Kreatur zu widerstehen. Nachdem sie mich eine halbe Minute lang auf ihrer Zunge herumgeworfen hat, schluckt sie und ich stürze in die Dunkelheit. Als ich in ihrem Magen lande, sehe ich ein paar andere Winzlinge und eine Menge Essen um mich herum. Heute werden wir alle von der Riesin verdaut und werden Teil ihres Körpers."
 giantess_feast.0006.a:0 "Was für eine furchtbare Art zu sterben!"
 giantess_feast.5003.t:0 "Gastgeberin ist gestorben, Fest ist vorbei"
 giantess_feast.5003.desc:0 "Gastgeberin ist gestorben, Fest ist vorbei."
 giantess_feast.5003.a:0 "Das ist Schade"
 giantess_feast.5004.t:0 "Ich bin im Gefängnis, das Fest ist vorbei"
 giantess_feast.5004.desc:0 "Ich bin im Gefängnis, das Fest ist vorbei."
 giantess_feast.5004.a:0 "Das ist Schade"
 giantess_feast.5005.t:0 "Gastgeberin im Gefängnis, Fest ist vorbei"
 giantess_feast.5005.desc:0 "Gastgeberin im Gefängnis, Fest ist vorbei"
 giantess_feast.5005.a:0 "Das ist Schade"
 giantess_feast.9001.t:0 "Ende des Festmahls"
 giantess_feast.9001.desc:0 "Die Party ist zu Ende, und es ist an der Zeit, mich von den anderen Riesinnen zu verabschieden. Ich habe während dieser Veranstaltung ziemlich viel zugenommen!"
 giantess_feast.9001.a:0 "Bis zum nächsten Mal!"

 giantess_feast.1000.desc:0 "Ich bereite ein Fest mit meinen Mitriesinnen vor, und ich werde viel Essen brauchen, um sie zu versorgen. Als mein Vasall hast du die Pflicht, deine Herrin mit Essen zu versorgen. Wenn du keine Männer schicken kannst, musst du selbst kommen und dein Leben opfern, damit wir ernährt werden können. Denke daran, dass die Nichterfüllung dieser Pflicht ein Verbrechen ist, das bestraft wird."
 giantess_feast.1000.a:0 "Ich werde meine Bauern zu dir schicken"
 giantess_feast.1000.a.message.t:0 "[vassal.GetFirstName] schickt Bauern"
 giantess_feast.1000.a.message.desc:0 "[vassal.GetFirstName] schickt Bauern!"
 giantess_feast.1000.b:0 "Ich werde meine Gefangenen zu dir schicken"
 giantess_feast.1000.b.message.t:0 "[vassal.GetFirstName] schickt Gefangene"
 giantess_feast.1000.b.message.desc:0 "[vassal.GetFirstName] schickt Gefangene!"
 giantess_feast.1000.c:0 "Ich will von einer Riesin gegessen werden!"
 giantess_feast.1000.c.message.t:0 "[vassal.GetFirstName] kommt selbst"
 giantess_feast.1000.c.message.desc:0 "[vassal.GetFirstName] opfert sich, um die Riesinnen zu füttern!"
 giantess_feast.1000.d:0 "Ich werde dir nichts schicken!"
 giantess_feast.1000.d.message.t:0 "[vassal.GetFirstName] vernachlässigt seine Pflicht"
 giantess_feast.1000.d.message.desc:0 "[vassal.GetFirstName] weigert sich, jemanden zu schicken, [vassal.GetSheHe] ist nun kriminell!"
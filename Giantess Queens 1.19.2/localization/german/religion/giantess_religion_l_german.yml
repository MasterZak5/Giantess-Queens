 macrosuprematism_adherent_plural:0 "Makrosuprematisten"
 macrosuprematism_desc:0 ""Makrosuprematisten sind Riesinnen, die glauben, dass die Winzlinge als Strafe für die Trägheit der Riesinnen geschaffen wurden. Um ihre Unsterblichkeit wiederzuerlangen, müssen die Riesinnen die Winzlinge versklaven und schließlich ausrotten. Wer weiß, vielleicht haben sie ja recht? Riesinnen erhalten keine Tyrannei, wenn sie unrechtmäßig handeln, und erhalten Frömmigkeit, wenn sie die Zwerge foltern."

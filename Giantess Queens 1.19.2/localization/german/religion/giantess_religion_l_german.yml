 macrocentrism:0 "Makrozentrismus"
 macrocentrism_adj:0 "Makrozentrisch"
 macrocentrism_adherent:0 "Makrozentrist"
 macrocentrism_adherent_plural:0 "Makrozentristen"
 macrocentrism_desc:0 "Makrozentristen erkennen an, dass die Riesinnen nach dem Ebenbild der Allmutter geschaffen wurden und daher den Winzlingen überlegen sind. Der Zweck der Existenz der Winzlinge ist es, ihren Riesinnen zu dienen, aber es ist verboten, den Winzlingen gegenüber grausam zu sein. Riesinnen haben weniger Tyrannengewinne durch ungesetzliche Handlungen und verlieren weniger Frömmigkeit."

 macrophilitism_desc:0 "Der vorherrschende Glaube der Riesinnenverehrung. Makrophilitiker glauben, dass Riesinnen und Winzlinge gleichberechtigt sind und die Rechte des jeweils anderen respektieren müssen. Riesinnen und Winzlinge haben die Verantwortung, sich gegenseitig zu befriedigen. Winzlinge sind verpflichtet, Riesinnen mit Nahrung zu versorgen."

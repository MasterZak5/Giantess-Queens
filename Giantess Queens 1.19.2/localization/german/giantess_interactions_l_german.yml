l_german:

 make_giantess_interaction:0 "Zu einer Riesin machen"
 giantess_execute_prisoner_interaction:0 "Riesinnen-Hinrichtung"
 giantess_execute_prisoner_interaction_desc:0 "Richte den Gefangenen mit deinen Vorzügen hin."
 giantess_execution.0003.t:0 "Qual der Wahl"
 giantess_execution.0003_desc:0 "[recipient.GetName] hat sich mir entgegengestellt und nun ist es Zeit für [recipient.GetHerHim], zu bezahlen! Aber wie sollte ich [recipient.GetHerHim] hinrichten? Welches meiner Körperteile wird das Leben dieses Käfers beenden?"
 giantess_execution.0003.a:0 "Zerdrücke [recipient.GetHerHim] unter dem Gewicht deines Arsches."
 giantess_execution.0003.b:0 "Verschlucke [recipient.GetHerHim] lebendig und verdaue [recipient.GetHerHim]!"
 giantess_execution.0003.c:0 "Zerdrücke [recipient.GetHerHim] mit deinem massiven Schuh wie einen Käfer!"
 giantess_execution.0001.t:0 "Von einer Riesin hingerichtet"
 giantess_execution.0001.desc_ass:0 "Ich sehe, wie meine Tür gewaltsam aufgestoßen wird, als [actor.GetShortUINamePossessive] Wächter hereinkommen und mich gegen den Boden drücken. Die [actor.GetTitleAsNameNoTooltip] selbst folgt ihnen mit einem breiten, zutiefst beunruhigenden Lächeln. Sie ist wahrlich wie eine Göttin neben mir, groß genug, um mich wie eine Puppe hochzuheben und tun, was ihr gefällt. \n\nOhne Rücksicht auf mein Kämpfen und Flehen hockt sie sich über mich und senkt ihren großen Arsch in Richtung meines Körpers. Er sinkt langsam herab, wirft einen dunklen Schatten auf meinen Körper und lässt mir gerade genug Zeit, darüber nachzudenken, wie es so weit kommen konnte, bevor ihr Fleisch mit meinem kollidiert und meine Knochen unter ihrem großen Gewicht zerquetscht werden. Mein letzter Atemzug wird unter ihrem prallen Hintern herausgequetscht, und bald liege ich leblos unter ihr."
 giantess_execution.0001.desc_swallow:0 "Ich sehe, wie meine Tür gewaltsam aufgestoßen wird, als [actor.GetTitleAsNameNoTooltip] eintritt. Unsere Blicke treffen sich, als sie mich anstarrt und ein bösartiges Grinsen auflegt, das mich zutiefst beunruhigt. Hat sie böse Absichten? \n\nIhr Arm schnellt zu mir, Finger greifen fest um meinen Oberkörper. \n\nIhr Arm schießt nach mir aus, die Finger greifen fest um meinen Oberkörper. Sie hockt sich vor mich hin, mit einem hungrigen und ungeduldigen Blick, während ich versuche, ihrer Kraft zu widerstehen. Sie stößt meinen Körper achtlos gegen ihre Lippen, ihr Mund öffnet sich weit, sodass ich entsetzt in ihren Rachen starren und sehen kann, wie sich die Spucke zwischen ihren Kiefern ausbreitet, während sie sich teilen. Sie zögert nur einen einzigen Moment, bevor sie mich in ihren klaffenden Schlund fallen lässt und ihre Finger heftig gegen meinen Rücken stößt. Ihre Lippen schließen sich hinter mir, als ich in ihren Mund verschwinde. Ihre Zunge beherrscht mich mit Leichtigkeit und zwingt meinen Körper in ihren Rachen. Es braucht nur ein paar laute, schleimige Schlucke, bis auch die kleinste Hoffnung, ihr zu widerstehen, die ich zuvor hatte, verschwunden ist. Sie lässt mich in ihrem Magen verkommen und stößt leises, zufriedenes Stöhnen aus, während sie sich den Bauch reibt. Die Riesin leckt sich die Lippen und lächelt zufrieden vor sich hin. Nachdem mein Körper stundenlang brennt, endet ihr knetender Magen schließlich mein Leben und ich werde als nichts weiter als eine einfache Mahlzeit verdaut, um eins mit [actor.GetShortUINamePossessiveNoTooltip] Körper zu werden."
 giantess_execution.0001.desc_shoecrush:0 "*Bumm* *Bumm*? Die Erde bebt, das kann nur eines bedeuten. Die Tür öffnet sich, ich sehe, wie mich [actor.GetTitleAsNameNoTooltip] direkt anstarrt. Dann sagt sie mit lauter und dröhnender Stimme: "Deine Zeit ist um, WURM!" Sie begann auf mich zuzugehen, und ich rannte instinktiv vor den bauwerkgroßen Füßen weg. Ich kann ihr nicht entkommen, und in meinem blinden Lauf knalle ich gegen die Wand. In die Enge getrieben, ich kann nirgendwo anders hin. Jetzt drehe ich mich um und sehe, wie dieses wirklich riesige Wesen auf mich herabstarrt. Sie hebt ihren Fuß über meinen Körper und verdeckt damit mein gesamtes Blickfeld, alles, was ich sehen kann, sind die anderen "Käfer", die auf dem Boden ihres Schuhs zerquetscht sind. Langsam senkt sie ihren Schuh auf mich und drückt mich gegen den Boden. Als ich spüre, wie mich das Leben verlässt, kann ich nur in die Gesichter derer starren, die das gleiche Schicksal ereilt hat."
  giantess_execution.0001.a:0 "Niemand kann mich retten..."
 giantess_execution.0002.t:1 "[recipient.GetName] hinrichten"
 giantess_execution.0002.desc_ass:1 "Als ich meinen Arsch zum Körper von [recipient.GetShortUINamePossessiveNoTooltip] senke, schreit [recipient.GetSheHe] und fleht mich um Gnade an. Dieser Narr hat einen Fehler gemacht und meinen Weg gekreuzt, jetzt ist [recipient.GetHerHis] Körper nur noch ein Fleck auf meinem Hintern."
 giantess_execution.0002.desc_swallow:1 "[recipient.GetName] zappelt und versucht, sich zu befreien, kann aber meine Hand nicht überwinden. Ich lege [recipient.GetHerHim] auf meine Zunge, schlucke und schicke den kleinen Scheißer direkt in meinen Bauch. Ich kann [recipient.GetHerHim] schreien und gegen meine Magenwände drücken fühlen, während [recipient.GetSheHe] lebendig verdaut und von meinem Körper absorbiert wird."
 giantess_execution.0002.a:1 "Gehorche mir oder stirb!"
 giantess_execution.0002.desc_shoecrush:0 "Ich schreite mit verschlagener Miene auf [recipient.GetName] zu, [recipient.GetSheHe] sieht unruhig Jeder Schritt, den ich mache, macht sich lautstark bemerkbar und lässt den Boden erzittern. [recipient.GetFirstName] [recipient.GetFirstName] beginnt bereits, vor mir zurückzuweichen, als ich mich [recipient.GetHerHim] nähere. "Das wird dir nicht helfen, WURM!", "Das wird dir nicht helfen, BUG!" sage ich und mache meine bösen Absichten deutlich, bevor ich anfange, jeden Schritt mit harter Kraft auszuführen und quasi Erdbeben aus [recipient.GetHerHis] Sicht zu schaffen. Ich hebe meinen Fuß über [recipient.GetHerHim] und zeige die verstümmelten Leichen früherer Opfer, denen ich, wissentlich oder unwissentlich, ein Ende bereitet und einen roten Fleck unter meinem Schuh hinterlassen habe. Der Gesichtsausdruck von [recipient.GetShortUINamePossessiveNoTooltip] wird immer verzweifelter, während ich meinen Fuß langsam auf [recipient.GetHerHim] senke. [recipient.GetName] versucht zu fliehen und zu schreien, aber es nützt nichts, und bald habe ich [recipient.GetHerHis] Körper fest im Griff. Ich beginne Druck auszuüben und in nur wenigen Sekunden - *PLOP*. Ich kichere. [recipient.GetName] hatte keine Chance."

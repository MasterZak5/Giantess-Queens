 giantess_meet_merchant_decision:0 "Eine Audienz mit einem fremden Händler halten"
 giantess_meet_merchant_decision_desc:0 "Ein seltsamer Händler ist in unserem Schloss angekommen. Er behauptet, er besitze eine Karte, die auf den Standort eines alten Tempels hinweist. Vielleicht sollte ich ihn empfangen und ihn nach dieser Karte fragen."
 giantess_meet_merchant_decision_confirm:0 "Bitte ihn herein"
 giantess_meet_merchant_decision_tooltip:0 "Nehmt diesen Händler in Empfang und seht, was er anbietet"
 giantess_attempt_decipher_map_decision:0 "Versuche, die Karte zu entziffern"
 giantess_attempt_decipher_map_decision_desc:0 "Ich sollte versuchen, die Karte zu entziffern, die der Händler mir gegeben hat."
 giantess_attempt_decipher_map_decision_tooltip:0 "Versuche, die Karte zu entziffern"
 giantess_attempt_decipher_map_decision_confirm:0 "Mit der Entschlüsselung der Karte beginnen"
 giantess_go_to_the_temple:0 "Geh zum geheimen Tempel!"
 giantess_go_to_the_temple_desc:0 "Es ist an der Zeit, dass ich zu dem Ort gehe, der auf der Karte eingezeichnet ist, und die Geheimnisse finde, die er birgt!"
 giantess_go_to_the_temple_tooltip:0 "Gehe zum Tempel"
 giantess_go_to_the_temple_confirm:0 "Auf zum Tempel!"
 host_giantess_feast_decision:0 "Halte Riesinnen-Festmahl"
 host_giantess_feast_decision_desc:0 "Haltet ein Festmahl für meine Mitriesinnen und gebt ihnen meine Gefangenen zu essen. Meine Dörfer werden einige Leute zum Essen schicken, und alle meine kleinen Vasallen müssen auch etwas dazu beitragen. Es ist ihre Pflicht, ihre Herrinnen zu versorgen."
 host_giantess_feast_decision_confirm:0 "Ladet die Mädels hierher ein!"
 host_giantess_feast_decision_tooltip:0 "Beginnt die Feier"
 I_HAVE_TEN_PRISONERS_FEAST:0 "Ich habe mindestens 10 erwachsene winzige Gefangene."
 I_HAVE_NOT_TEN_PRISONERS_FEAST:0 "Ich habe nicht mindestens 10 erwachsene winzige Gefangene."
